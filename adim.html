<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BINGO — Admin</title>
<link rel="icon" href="../icon.png">
<style>
  :root{
    --bg:#0f172a; --card:#111827; --muted:#94a3b8; --text:#e5e7eb; --brand:#f59e0b;
    --red:#ef4444; --green:#22c55e; --yellow:#facc15; --ring:#1f2937;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; background:linear-gradient(180deg,#fde68a 0%,#fef3c7 40%,#fde68a 100%);
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Ubuntu,"Noto Sans",sans-serif;
    color:var(--text);
  }
  header{
    position:sticky; top:0; z-index:10; backdrop-filter:blur(8px);
    background:rgba(15,23,42,.85); border-bottom:1px solid #1f2937;
  }
  .wrap{max-width:1200px;margin:0 auto;padding:12px 16px}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .brand{display:flex;gap:10px;align-items:center}
  .badge{background:#111827;border:1px solid #374151;color:#f59e0b;padding:6px 10px;border-radius:10px;font-weight:700}
  button,select,input{
    color:var(--text);background:#0b1220;border:1px solid #263043;border-radius:10px;
    padding:10px 12px;outline:none;transition:.15s;box-shadow:0 0 0 0 rgba(245,158,11,0);
  }
  button:hover,select:hover,input:hover{border-color:#3b4a64}
  button:active{transform:translateY(1px)}
  .btn{display:inline-flex;gap:8px;align-items:center;font-weight:600}
  .btn.primary{background:#1f2937;border-color:#374151}
  .btn.danger{background:#3b0d0d;border-color:#7f1d1d}
  .btn.success{background:#0f2e1c;border-color:#166534}
  .sp{flex:1}
  main{max-width:1200px;margin:18px auto;padding:16px}
  .panel{
    background:var(--bg); border:1px solid #1f2937; border-radius:20px; padding:18px; 
    box-shadow:0 10px 30px rgba(2,6,23,.35);
  }
  .filters{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:720px){.filters{grid-template-columns:1fr}}
  .list{margin-top:16px;display:grid;gap:12px}
  .card{
    background:#0b1220;border:1px solid #1e293b;border-radius:16px;overflow:hidden;
  }
  .cardHead{
    display:flex;gap:10px;align-items:center;justify-content:space-between;
    padding:12px 14px;background:#0f172a;border-bottom:1px solid #1e293b;
  }
  .pill{font-size:12px;font-weight:700;padding:6px 10px;border-radius:999px;display:inline-flex;gap:6px;align-items:center}
  .pill.lost{background:#3b0d0d;color:#fecaca;border:1px solid #7f1d1d}
  .pill.found{background:#0f2e1c;color:#bbf7d0;border:1px solid #166534}
  .pill.reward{background:#3a3006;color:#fef08a;border:1px solid #854d0e}
  .meta{display:flex;flex-wrap:wrap;gap:8px;color:var(--muted);font-size:13px}
  .cardBody{padding:14px;display:grid;gap:10px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media (max-width:800px){.grid2{grid-template-columns:1fr}}
  .muted{color:var(--muted)}
  .hr{height:1px;background:#1e293b;margin:6px 0}
  .empty{
    border:2px dashed #334155;border-radius:16px;padding:36px;text-align:center;color:#94a3b8;
    background:#0b1220;
  }
  .footerRow{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:flex-end}
  .dangerTxt{color:#fecaca}
  .ok{color:#86efac}
  .warn{color:#fde68a}
  .tag{background:#111827;border:1px solid #334155;border-radius:8px;padding:4px 8px;font-size:12px}
  .hide{display:none!important}
  .userLine{display:flex;gap:8px;align-items:center}
  .userAvatar{
    width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid #1f2937;background:#111827
  }
  .toast{
    position:fixed;right:14px;bottom:14px;z-index:50;background:#111827;border:1px solid #334155;
    color:#e5e7eb;padding:10px 12px;border-radius:10px;box-shadow:0 10px 20px rgba(0,0,0,.35);
    display:flex;gap:10px;align-items:center;min-width:220px
  }
</style>
</head>
<body>

<header>
  <div class="wrap row">
    <div class="brand">
      <span class="badge">🛡️ ADMIN</span>
      <div id="meLine" class="userLine muted">Kirmagansiz</div>
    </div>
    <span class="sp"></span>
    <button id="btnSign" class="btn primary">🔐 Google bilan kirish</button>
    <button id="btnOut" class="btn" style="display:none">🚪 Chiqish</button>
  </div>
</header>

<main>
  <div class="panel">
    <div class="row" style="margin-bottom:12px">
      <button id="btnReload" class="btn">🔄 Yangilash</button>
      <select id="selType">
        <option value="all">Hammasi</option>
        <option value="lost">❗ Yo‘qotdim</option>
        <option value="found">✅ Topdim</option>
        <option value="reward">🎁 Mukofotli</option>
      </select>
      <input id="q" placeholder="Qidirish: sarlavha, shahar, uid, email" />
      <span class="sp"></span>
      <span id="count" class="muted tag">0 ta e’lon</span>
    </div>

    <div id="alerts" class="row hide"></div>
    <div id="list" class="list"></div>
    <div id="empty" class="empty hide">E’lonlar yo‘q yoki filtr bo‘yicha topilmadi.</div>
  </div>
</main>

<div id="toast" class="toast hide"><span id="toastMsg">OK</span></div>

<!-- Firebase (v9 modular) -->
<script type="module">
  /* ----------------------------- Firebase init ----------------------------- */
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";
  import { 
    getFirestore, collection, doc, getDoc, onSnapshot, query, orderBy, limit, deleteDoc 
  } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

  // ✅ Sening configing (storageBucket ni appspot.com ga to‘g‘riladik)
  const firebaseConfig = {
    apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
    authDomain: "topildi.firebaseapp.com",
    databaseURL: "https://topildi-default-rtdb.firebaseio.com",
    projectId: "topildi",
    storageBucket: "topildi.appspot.com",
    messagingSenderId: "323891530719",
    appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
    measurementId: "G-NKCMKCXZQ7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);
  const provider = new GoogleAuthProvider();

  /* ----------------------------- UI helpers ----------------------------- */
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);
  const meLine = $("#meLine");
  const btnSign = $("#btnSign");
  const btnOut  = $("#btnOut");
  const btnReload = $("#btnReload");
  const selType  = $("#selType");
  const listEl   = $("#list");
  const emptyEl  = $("#empty");
  const qInput   = $("#q");
  const countEl  = $("#count");
  const toastEl  = $("#toast");
  const toastMsg = $("#toastMsg");

  let unsubscribe = null; // onSnapshot unsub
  let cache = [];         // barcha e’lonlar (client filter uchun)
  let me = null;          // current user
  let isAdmin = false;

  function toast(msg, kind="ok"){
    toastMsg.textContent = msg;
    toastEl.classList.remove("hide");
    toastEl.style.borderColor = (kind==="err") ? "#7f1d1d" : (kind==="warn"?"#854d0e":"#166534");
    toastEl.style.color = (kind==="err") ? "#fecaca" : (kind==="warn"?"#fde68a":"#e5e7eb");
    setTimeout(()=> toastEl.classList.add("hide"), 2200);
  }

  function fmtTime(ts){
    const d = ts?.toDate?.() ?? new Date(ts);
    return d.toLocaleString("uz-UZ", {hour12:false});
  }

  function badge(type){
    if(type==="lost")  return '<span class="pill lost">❗ Yo‘qotdim</span>';
    if(type==="found") return '<span class="pill found">✅ Topdim</span>';
    if(type==="reward")return '<span class="pill reward">🎁 Mukofot</span>';
    return '<span class="pill">📌</span>';
  }

  function userLine(u){
    const img = u?.photoURL || "https://ui-avatars.com/api/?background=111827&color=e5e7eb&name="+encodeURIComponent(u?.displayName||"U");
    const name = u?.displayName || "Foydalanuvchi";
    const email = u?.email || "—";
    const uid = u?.uid || "—";
    return `
      <div class="userLine">
        <img class="userAvatar" src="${img}" alt="">
        <div>
          <div>${name} <span class="tag">${email}</span></div>
          <div class="muted" style="font-size:12px">UID: ${uid}</div>
        </div>
      </div>
    `;
  }

  function buildCard(item){
    const u = item.user || {};
    return `
      <article class="card" data-id="${item.id}" data-type="${item.type}">
        <div class="cardHead">
          <div class="row" style="gap:8px">
            ${badge(item.type)}
            <strong>${item.title || "Sarlavhasiz"}</strong>
            <span class="tag">${item.city || "Shahar —"}</span>
            <span class="tag">#${item.category || "umumiy"}</span>
          </div>
          <div class="row">
            <button class="btn danger btnDel" title="O‘chirish">🗑️ O‘chirish</button>
          </div>
        </div>
        <div class="cardBody">
          <div class="grid2">
            <div>
              <div class="muted">Tavsif</div>
              <div>${item.desc || "—"}</div>
            </div>
            <div>
              <div class="muted">Aloqa</div>
              <div>📞 ${item.phone || "—"} &nbsp;&nbsp; ✉️ ${u.email || "—"}</div>
              <div class="muted">Joylangan: ${fmtTime(item.createdAt)}</div>
            </div>
          </div>
          <div class="hr"></div>
          ${userLine(u)}
        </div>
      </article>
    `;
  }

  function applyFilter(){
    const t = selType.value;        // all/lost/found/reward
    const q = qInput.value.trim().toLowerCase();
    let rows = cache;

    if(t !== "all"){
      rows = rows.filter(x => (x.type===t));
    }
    if(q){
      rows = rows.filter(x => {
        const blob = [
          x.title, x.desc, x.city, x.category,
          x.user?.email, x.user?.displayName, x.user?.uid, x.phone
        ].join(" ").toLowerCase();
        return blob.includes(q);
      });
    }

    listEl.innerHTML = rows.map(buildCard).join("");
    emptyEl.classList.toggle("hide", rows.length>0);
    countEl.textContent = rows.length + " ta e’lon";

    // bind delete buttons
    $$(".btnDel").forEach(btn=>{
      btn.onclick = async (e)=>{
        const card = e.currentTarget.closest(".card");
        const id = card.dataset.id;
        if(!confirm("Ushbu e’loni o‘chirasizmi?")) return;
        try{
          await deleteDoc(doc(db,"Elonlar", id));
          toast("O‘chirildi");
        }catch(err){
          console.error(err);
          toast("O‘chirishda xatolik", "err");
        }
      };
    });
  }

  function startFeed(){
    // Real-time stream: Elonlar (eng yangi birinchi)
    if(unsubscribe) unsubscribe();
    const qy = query(collection(db,"Elonlar"), orderBy("createdAt","desc"), limit(500));
    unsubscribe = onSnapshot(qy, (snap)=>{
      cache = [];
      snap.forEach(d=>{
        const x = d.data();
        cache.push({
          id: d.id,
          type: x.type || "lost",
          title: x.title || x.sarlavha || "",
          desc: x.desc || x.izoh || "",
          city: x.city || x.shahar || "",
          category: x.category || x.tur || "",
          phone: x.phone || x.aloqa || "",
          createdAt: x.createdAt || x.ts || Date.now(),
          user: x.user || {uid:x.uid,email:x.email,displayName:x.name,photoURL:x.photoURL}
        });
      });
      applyFilter();
    }, (err)=>{
      console.error(err);
      toast("Stream xatosi: " + err.message, "err");
    });
  }

  async function checkAdmin(uid){
    // rules/{uid}.admin == true
    try{
      const ref = doc(db,"rules", uid);
      const s = await getDoc(ref);
      return s.exists() && s.data().admin === true;
    }catch(e){
      console.error(e);
      return false;
    }
  }

  /* ----------------------------- Auth wiring ----------------------------- */
  btnSign.onclick = async ()=>{
    try{
      await signInWithPopup(auth, provider);
    }catch(e){
      console.error(e);
      toast("Kirish bekor qilindi", "warn");
    }
  };
  btnOut.onclick = ()=> signOut(auth);

  btnReload.onclick = ()=> applyFilter();
  selType.onchange   = ()=> applyFilter();
  qInput.oninput     = ()=> applyFilter();

  onAuthStateChanged(auth, async (user)=>{
    me = user || null;
    if(!me){
      isAdmin = false;
      btnSign.style.display="inline-flex";
      btnOut.style.display="none";
      meLine.innerHTML = `<span class="muted">Kirmagansiz</span>`;
      listEl.innerHTML = "";
      emptyEl.classList.remove("hide");
      if(unsubscribe) unsubscribe();
      return;
    }

    // UI top-right
    const img = me.photoURL || "https://ui-avatars.com/api/?background=111827&color=e5e7eb&name="+encodeURIComponent(me.displayName||"U");
    meLine.innerHTML = `
      <img class="userAvatar" src="${img}" alt="">
      <div>
        <div>${me.displayName||"Siz"} <span class="tag">${me.email}</span></div>
        <div class="muted" style="font-size:12px">UID: ${me.uid}</div>
      </div>
    `;
    btnSign.style.display="none";
    btnOut.style.display="inline-flex";

    // Admin tekshiruv
    isAdmin = await checkAdmin(me.uid);
    if(!isAdmin){
      listEl.innerHTML = "";
      emptyEl.classList.remove("hide");
      toast("Sizda admin ruxsati yo‘q", "err");
      return;
    }

    // Agar admin bo‘lsa streamni ishga tushiramiz
    startFeed();
    toast("Hush kelibsiz, admin!");
  });

  // Ustozcha kichik UX: Enter bosilsa qidiruvdan fokus chiqmasin
  qInput.addEventListener("keydown", (e)=>{
    if(e.key==="Enter") e.preventDefault();
  });

  // Dastlabki ko‘rinish:
  emptyEl.classList.remove("hide");
</script>
</body>
</html>
