<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BINGO — Admin panel</title>
  <link rel="icon" href="../icon.png" />
  <style>
    :root{
      --bg:#0f172a;         /* fon (slate-900) */
      --card:#111827;       /* kartalar (gray-900) */
      --muted:#1f2937;      /* panel */
      --text:#e5e7eb;       /* matn */
      --sub:#9ca3af;        /* ikkilamchi matn */
      --brand:#fbbf24;      /* sariq */
      --good:#22c55e;       /* yashil */
      --bad:#ef4444;        /* qizil */
      --chip:#334155;       /* chip foni */
      --chipText:#cbd5e1;
      --border:#1f2937;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:#fef3c7;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Ubuntu,Arial}
    .wrap{max-width:1024px;margin:32px auto;padding:16px}
    .head{
      background:var(--bg); color:var(--text);
      padding:20px;border-radius:16px; box-shadow:0 8px 24px rgba(2,6,23,.25)
    }
    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    .btn{cursor:pointer;background:var(--brand);color:#1f2937;border:none;border-radius:12px;
         font-weight:700;padding:12px 16px;display:inline-flex;gap:10px;align-items:center}
    .btn.secondary{background:var(--muted);color:var(--text)}
    .btn.danger{background:var(--bad);color:#fff}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .select, .search{
      background:var(--muted); color:var(--text); border:1px solid var(--border);
      border-radius:12px; padding:12px 14px; outline:none
    }
    .search{min-width:260px;flex:1}
    .hint{color:var(--sub);font-size:13px;margin-top:6px}
    .grid{margin-top:18px;display:grid;grid-template-columns:1fr;gap:14px}
    .card{
      border-radius:14px;background:var(--bg);color:var(--text);border:1px solid var(--border);
      padding:14px 14px 10px 14px
    }
    .cardHead{display:flex;gap:10px;align-items:center;justify-content:space-between}
    .chips{display:flex;gap:6px;flex-wrap:wrap}
    .chip{background:var(--chip);color:var(--chipText);padding:6px 10px;border-radius:999px;font-size:12.5px}
    .chip.good{background:#064e3b;color:#a7f3d0}
    .chip.bad{background:#7f1d1d;color:#fecaca}
    .chip.reward{background:#3f1f06;color:#fde68a}
    .meta{color:var(--sub);font-size:12.5px;display:flex;gap:10px;flex-wrap:wrap}
    .title{font-weight:800}
    .body{margin-top:8px;white-space:pre-wrap;line-height:1.5}
    .acts{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
    .author{margin-top:10px}
    .sep{height:1px;background:var(--border);margin:10px 0}
    .empty{color:#475569;background:var(--bg);border:1px dashed #334155;border-radius:14px;padding:22px;text-align:center}
    .foot{margin-top:22px;color:#374151;font-size:13px;text-align:center}
    .shield{font-size:18px}
    .tag{font-weight:700;color:var(--brand)}
    @media(min-width:700px){ .grid{grid-template-columns:1fr 1fr} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <div class="row">
        <div class="shield">🛡️</div>
        <h2 style="margin:0">Admin panel</h2>
      </div>

      <div class="row" style="margin-top:14px">
        <button id="btnRefresh" class="btn"><span>🔄</span>Yangilash</button>
        <select id="filterKind" class="select">
          <option value="all">Hammasi</option>
          <option value="lost">❗ Yo‘qolganlar</option>
          <option value="found">✅ Topilganlar</option>
          <option value="reward">🎁 Mukofotli</option>
        </select>
        <input id="q" class="search" placeholder="Qidirish: narsa, shahar, uid, email, ism..." />
      </div>
      <div class="hint">Faqat <span class="tag">/rules/{uid} → {"admin": true}</span> bo‘lgan foydalanuvchi kira oladi. Deleting uchun Firestore Rules’ni mos qiling.</div>
    </div>

    <div id="list" class="grid" style="min-height:120px;margin-top:14px">
      <div class="empty">Ma’lumot yuklanmoqda…</div>
    </div>

    <div class="foot">© 2025 BINGO — Admin</div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore-compat.js"></script>

  <script>
    // =====================  FIREBASE CONFIG  =====================
    // TODO: paste your firebaseConfig here (xuddi asosiy index.html dagidek)
    const firebaseConfig = window.__FBCONFIG || {
      /* PASTE YOUR CONFIG HERE */
    };
    // ============================================================

    // Init
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    // ----- DOM
    const listEl   = document.getElementById('list');
    const btnRef   = document.getElementById('btnRefresh');
    const qEl      = document.getElementById('q');
    const kindEl   = document.getElementById('filterKind');

    // State
    let ALL = [];      // normalizatsiya qilingan postlar
    let ADMIN = false; // /rules/{uid}.admin

    // --------- UTIL: field aliaslarni normalizatsiya ----------
    const pick = (...vals) => vals.find(v => v !== undefined && v !== null && v !== "") ?? undefined;

    function normalize(doc) {
      const d = doc.data();
      // Maydon aliaslari: sizdagi nomlar bo‘lsa ham ushlashga harakat qiladi
      const item        = pick(d.item, d.narsa, d.title, d.sarlavha, d.object);
      const city        = pick(d.city, d.shahar, d.location);
      const kind        = (pick(d.kind, d.tur, d.type, d.status) || '').toString().toLowerCase(); // lost/found
      const reward      = pick(d.reward, d.mukofot, d.price, d.sum);
      const desc        = pick(d.desc, d.description, d.izoh, d.matn, d.body, d.info);
      const contact     = pick(d.contact, d.aloqa, d.phone, d.telefon, d.tel);
      const authorName  = pick(d.authorName, d.name, d.ism, d.fullname, d.fio);
      const authorEmail = pick(d.authorEmail, d.email, d.mail);
      const uid         = pick(d.uid, d.userId, d.createdBy, d.ownerUid);
      const created     = pick(d.created, d.createdAt, d.ts, d.time, d.timestamp);
      const pinned      = !!pick(d.pinned, d.pin, d.isPinned);
      const cityLc      = (city||'').toString();

      // qidirish satri uchun qulay satr
      const index = [
        item, city, kind, reward, desc, contact, authorName, authorEmail, uid
      ].filter(Boolean).join(' ').toLowerCase();

      // status bayroqlari
      const isLost   = /lost|yoqol|yo'qol|yo‘qol/i.test(kind || '');
      const isFound  = /found|topild/i.test(kind || '');
      const hasRw    = reward !== undefined && reward !== null && reward !== '' && Number(reward) > 0;

      return {
        id: doc.id,
        ref: doc.ref,
        raw: d,
        item, city: cityLc, kind, reward, desc, contact,
        authorName, authorEmail, uid,
        created: typeof created === 'number' ? created : (created?.toMillis?.() ?? Date.now()),
        pinned,
        flags: { lost: isLost, found: isFound, reward: hasRw },
        index
      };
    }

    // ------- UI chizish -------
    function timeAgo(ms) {
      const s = Math.max(1, Math.floor((Date.now() - ms)/1000));
      const m = Math.floor(s/60), h=Math.floor(m/60), d=Math.floor(h/24);
      if (d>0) return d+" kun avval";
      if (h>0) return h+" soat avval";
      if (m>0) return m+" daqiqa avval";
      return s+" soniya avval";
    }

    function row(p) {
      const chips = [];
      if (p.flags.lost)   chips.push('<span class="chip bad">❗ Yo‘qolgan</span>');
      if (p.flags.found)  chips.push('<span class="chip good">✅ Topilgan</span>');
      if (p.flags.reward) chips.push('<span class="chip reward">🎁 Mukofotli</span>');

      const title = [p.item || 'Noma’lum narsa', p.city && ' · ' + p.city].filter(Boolean).join('');
      const meta  = [
        p.uid && `UID: <b>${p.uid}</b>`,
        p.authorEmail && `Email: <b>${p.authorEmail}</b>`,
        p.authorName && `Ism: <b>${p.authorName}</b>`,
        'Vaqt: ' + timeAgo(p.created)
      ].filter(Boolean).join(' • ');

      return `
      <div class="card" data-id="${p.id}">
        <div class="cardHead">
          <div class="chips">${chips.join(' ')}</div>
          ${p.pinned ? '<span class="chip">📌 pinned</span>' : ''}
        </div>
        <div class="title">${title}</div>
        <div class="meta" style="margin-top:6px">${meta}</div>
        ${p.desc ? `<div class="body">${escapeHtml(p.desc)}</div>` : ''}
        <div class="sep"></div>
        <div class="author">
          <div class="meta">Aloqa: <b>${p.contact ? escapeHtml(p.contact) : '—'}</b></div>
        </div>
        <div class="acts">
          <button class="btn danger" data-act="del" data-id="${p.id}">🗑️ O‘chirish</button>
          <button class="btn secondary" data-act="copy" data-id="${p.id}">🔗 ID nusxa</button>
        </div>
      </div>`;
    }

    function escapeHtml(s){
      return (s||'').toString()
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    function render() {
      const q = qEl.value.trim().toLowerCase();
      const k = kindEl.value;

      let arr = ALL.slice().sort((a,b)=>{
        // pinned birinchi, so‘ngra so‘nggi e’lon
        if (a.pinned && !b.pinned) return -1;
        if (!a.pinned && b.pinned) return 1;
        return b.created - a.created;
      });

      if (k==='lost')   arr = arr.filter(x=>x.flags.lost);
      if (k==='found')  arr = arr.filter(x=>x.flags.found);
      if (k==='reward') arr = arr.filter(x=>x.flags.reward);

      if (q) arr = arr.filter(x=>x.index.includes(q));

      if (!arr.length) {
        listEl.innerHTML = `<div class="empty">Hech narsa topilmadi.</div>`;
        attachActions();
        return;
      }

      listEl.innerHTML = arr.map(row).join('');
      attachActions();
    }

    function attachActions(){
      listEl.querySelectorAll('[data-act="del"]').forEach(btn=>{
        btn.onclick = async ()=>{
          if (!ADMIN) { alert('Sizda admin huquqi yo‘q.'); return; }
          const id = btn.dataset.id;
          const post = ALL.find(x=>x.id===id);
          if (!post) return;
          if (!confirm(`Rostdan ham o‘chirasizmi?\n\n${post.item || ''} (${post.city || ''})`)) return;
          btn.disabled=true;
          try{
            await post.ref.delete();
            ALL = ALL.filter(x=>x.id!==id);
            render();
          }catch(e){
            console.error(e);
            alert('O‘chirishda xatolik: '+e.message);
          }finally{ btn.disabled=false; }
        };
      });

      listEl.querySelectorAll('[data-act="copy"]').forEach(btn=>{
        btn.onclick = async ()=>{
          const id = btn.dataset.id;
          await navigator.clipboard.writeText(id);
          btn.textContent = '✅ Nusxa olindi';
          setTimeout(()=>btn.textContent='🔗 ID nusxa',1200);
        };
      });
    }

    // ---------- Firestore’dan o‘qish ----------
    async function loadAll() {
      if (!auth.currentUser) return;

      btnRef.disabled = true;
      listEl.innerHTML = `<div class="empty">Yuklanmoqda…</div>`;

      // 1) rules/{uid} dan admin holatini tekshirish
      try{
        const r = await db.collection('rules').doc(auth.currentUser.uid).get();
        ADMIN = !!(r.exists && r.data()?.admin);
      }catch(e){ console.warn('rules read fail', e); }

      // 2) posts kolleksiyasi
      let out = [];
      try{
        const snap = await db.collection('posts').get();
        snap.forEach(d=> out.push(normalize(d)));
      }catch(e){ console.warn('posts read fail', e); }

      // 3) Agar bo‘sh bo‘lsa fallback’lar
      if (out.length===0) {
        // Elonlar (agar shu nomda saqlagan bo‘lsangiz)
        try{
          const snap = await db.collection('Elonlar').get();
          snap.forEach(d=> out.push(normalize(d)));
        }catch(e){}

        // alerts — agar ishlatsangiz
        try{
          const snap = await db.collection('alerts').get();
          snap.forEach(d=> out.push(normalize(d)));
        }catch(e){}
      }

      ALL = out;
      render();
      btnRef.disabled = false;
    }

    // ---------- Auth (faqat Google) ----------
    async function ensureAuth(){
      return new Promise((resolve)=>{
        auth.onAuthStateChanged(async (u)=>{
          if(!u){
            // Google bilan login oynasi
            const provider = new firebase.auth.GoogleAuthProvider();
            try{
              await auth.signInWithPopup(provider);
            }catch(e){
              alert('Kirish kerak: '+e.message);
              return;
            }
          }
          resolve(auth.currentUser);
        });
      });
    }

    // --------- events ----------
    btnRef.onclick = loadAll;
    qEl.addEventListener('input', render);
    kindEl.onchange = render;

    (async function start(){
      await ensureAuth();
      await loadAll();
    })();
  </script>
</body>
</html>
