<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BINGO — Topildi/Yoqoldi</title>
  <meta name="theme-color" content="#0ea5e9" />

  <style>
    /* ====== Asosiy minimal UI (navbar) ====== */
    :root{
      --bg:#fff7e6;
      --ink:#0f172a;
      --muted:#6b7280;
      --brand:#0ea5e9;
      --card:#111827;
      --radius:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;background:var(--bg);color:var(--ink);
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    }
    .nav{
      position:sticky;top:0;z-index:10;
      background:#fff;border-bottom:1px solid #e5e7eb;
      display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;
    }
    .brand{font-weight:800;letter-spacing:.3px}
    .grow{flex:1}
    .btn{
      border:1px solid #e5e7eb;background:#fff;color:#111827;height:40px;
      padding:0 .9rem;border-radius:10px;display:inline-flex;align-items:center;gap:.5rem;
      font-weight:700
    }
    .btn:hover{background:#f8fafc}
    .btn.primary{background:var(--brand);border-color:transparent;color:#fff}
    .container{max-width:980px;margin:16px auto;padding:0 12px}
    .ad-box{
      background:#0b1220;color:#e5e7eb;border-radius:20px;padding:16px;
      min-height:180px;display:flex;align-items:center;justify-content:center
    }

    /* ====== ADMIN PANEL: oq fonli to‘liq ekran ====== */
    :root{
      --admin-bg:#ffffff;
      --admin-text:#0f172a;
      --admin-muted:#6b7280;
      --admin-border:#e5e7eb;
      --admin-accent:#0ea5e9;
      --admin-danger:#ef4444;
      --admin-ok:#10b981;
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.1), 0 8px 10px -6px rgba(0,0,0,.1);
    }
    .admin-overlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.25);display:none}
    .admin-sheet{position:absolute;inset:0;background:var(--admin-bg);color:var(--admin-text);display:flex;flex-direction:column;box-shadow:var(--shadow-xl)}
    .admin-header{position:sticky;top:0;z-index:1;display:flex;align-items:center;gap:.75rem;padding:1rem 1.25rem;border-bottom:1px solid var(--admin-border);background:var(--admin-bg)}
    .admin-title{font-weight:800;letter-spacing:.3px;font-size:1.15rem}
    .admin-actions{margin-left:auto;display:flex;gap:.5rem}
    .admin-btn{border:1px solid var(--admin-border);background:#fff;color:#111827;height:40px;padding:0 .9rem;border-radius:.6rem;display:inline-flex;align-items:center;gap:.5rem;font-weight:600}
    .admin-btn:hover{background:#f8fafc}
    .admin-btn.primary{background:var(--admin-accent);color:#fff;border-color:transparent}
    .admin-btn.primary:hover{filter:brightness(.95)}
    .admin-btn.danger{background:var(--admin-danger);color:#fff;border-color:transparent}
    .admin-body{padding:1rem;overflow:auto;height:100%}
    .admin-toolbar{display:grid;grid-template-columns:1fr 180px 160px;gap:.75rem;margin-bottom:1rem}
    .admin-input,.admin-select{width:100%;height:44px;padding:.6rem .8rem;border:1px solid var(--admin-border);border-radius:.6rem;background:#fff;color:#111827;font-weight:600}
    .admin-input::placeholder{color:var(--admin-muted);font-weight:500}
    .admin-grid{display:grid;gap:.9rem;grid-template-columns: repeat(auto-fill, minmax(320px, 1fr))}
    .admin-card{border:1px solid var(--admin-border);border-radius:.9rem;background:#fff;padding:1rem;display:flex;flex-direction:column;gap:.6rem}
    .admin-row{display:flex;gap:.5rem;flex-wrap:wrap}
    .badge{font-size:.75rem;padding:.2rem .5rem;border-radius:999px;border:1px solid var(--admin-border);background:#f8fafc}
    .badge.ok{background:#ecfdf5;color:#065f46;border-color:#a7f3d0}
    .badge.warn{background:#fff7ed;color:#9a3412;border-color:#fed7aa}
    .badge.type{background:#eff6ff;color:#1e40af;border-color:#bfdbfe}
    .meta{color:var(--admin-muted);font-weight:600;font-size:.86rem}
    .title{font-weight:800;font-size:1rem}
    .desc{color:#334155;line-height:1.5}
    .card-actions{display:flex;gap:.5rem;margin-top:.25rem}
    .hr{height:1px;background:var(--admin-border);margin:.4rem 0}
    @media (max-width:640px){.admin-toolbar{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <!-- ====== Navbar ====== -->
  <nav class="nav">
    <div class="brand">BINGO</div>
    <div class="grow"></div>
    <!-- Admin tugmasi (faqat admin foydalanuvchi ko‘rishi uchun JS’da nazorat qilasiz) -->
    <button id="openAdmin" class="btn primary">🛡️ Admin</button>
  </nav>

  <!-- ====== Asosiy kontent (qisqa) ====== -->
  <main class="container">
    <div class="ad-box">
      ★ Bu yerda sizning reklamangiz bo‘lishi mumkin
    </div>
  </main>

  <!-- ====== ADMIN OVERLAY (to‘liq ekran oq fon) ====== -->
  <div id="adminOverlay" class="admin-overlay" aria-hidden="true">
    <section class="admin-sheet" role="dialog" aria-modal="true" aria-label="Admin panel">
      <header class="admin-header">
        <span class="admin-title">🛡️ Admin panel</span>
        <div class="admin-actions">
          <button id="admRefresh" class="admin-btn">🔄 Yangilash</button>
          <button id="admClose" class="admin-btn">✖ Yopish</button>
        </div>
      </header>

      <div class="admin-body">
        <div class="admin-toolbar">
          <input id="admSearch" class="admin-input" placeholder="Qidirish: sarlavha, shahar, uid, email..." />
          <select id="admType" class="admin-select">
            <option value="all">Hammayoq</option>
            <option value="lost">❗ Yo‘qotdim</option>
            <option value="found">✅ Topdim</option>
            <option value="reward">🎁 Mukofotli</option>
          </select>
          <select id="admStatus" class="admin-select">
            <option value="all">Barcha holat</option>
            <option value="active">Faol</option>
            <option value="removed">O‘chirilgan</option>
          </select>
        </div>

        <div class="admin-grid" id="admGrid"></div>
      </div>
    </section>
  </div>

  <!-- ====== Firebase + Admin JS ====== -->
  <script type="module">
    /* ---------------- Firebase SDK ---------------- */
    import { initializeApp }        from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getAuth, onAuthStateChanged, signInWithPopup, GoogleAuthProvider } 
                                   from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
    import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc, updateDoc } 
                                   from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // >>> Siz bergan config:
    const firebaseConfig = {
      apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
      authDomain: "topildi.firebaseapp.com",
      databaseURL: "https://topildi-default-rtdb.firebaseio.com",
      projectId: "topildi",
      storageBucket: "topildi.firebasestorage.app",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
      measurementId: "G-NKCMKCXZQ7"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);

    /* ---------------- Admin UI elementlari ---------------- */
    const $overlay  = document.getElementById('adminOverlay');
    const $grid     = document.getElementById('admGrid');
    const $openBtn  = document.getElementById('openAdmin');
    const $closeBtn = document.getElementById('admClose');
    const $refresh  = document.getElementById('admRefresh');
    const $search   = document.getElementById('admSearch');
    const $typeSel  = document.getElementById('admType');
    const $statSel  = document.getElementById('admStatus');

    function openAdmin(){ $overlay.style.display='block'; renderAdmin(); }
    function closeAdmin(){ $overlay.style.display='none'; }

    $openBtn.addEventListener('click', async ()=>{
      // admin tekshiruvi: Firestore rules kolleksiyasi (/rules/{UID}: {admin:true})
      const user = auth.currentUser || await ensureGoogleLogin();
      const ok = await isAdmin(user?.uid);
      if(!ok){ alert('Admin ruxsati yo‘q.'); return; }
      openAdmin();
    });
    $closeBtn.addEventListener('click', closeAdmin);
    $refresh.addEventListener('click', renderAdmin);
    $search.addEventListener('input', debounce(renderAdmin, 250));
    $typeSel.addEventListener('change', renderAdmin);
    $statSel.addEventListener('change', renderAdmin);

    /* ---------------- Yordamchilar ---------------- */
    function debounce(fn, t=300){ let h; return (...a)=>{ clearTimeout(h); h=setTimeout(()=>fn(...a), t); }; }
    const fmt = new Intl.DateTimeFormat('uz-UZ', {dateStyle:'medium', timeStyle:'short'});
    function escapeHTML(s=''){ return s.replace(/[&<>"']/g, m=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m])); }

    async function ensureGoogleLogin(){
      return new Promise((resolve,reject)=>{
        onAuthStateChanged(auth, async (u)=>{
          if(u) return resolve(u);
          try{
            const provider = new GoogleAuthProvider();
            const {user} = await signInWithPopup(auth, provider);
            resolve(user);
          }catch(e){ reject(e); }
        });
      });
    }

    async function isAdmin(uid){
      if(!uid) return false;
      try{
        const snap = await getDocs(query(collection(db,'rules')));
        let ok=false;
        snap.forEach(d=>{ if(d.id===uid && d.data()?.admin===true) ok=true; });
        return ok;
      }catch{ return false; }
    }

    function normalizeAd(raw, id){
      const x = raw || {};
      return {
        id,
        type: (x.type || x.turi || x.kategoriya || 'lost').toLowerCase(),
        title: x.title ?? x.sarlavha ?? '(sarlavha yo‘q)',
        desc: x.desc ?? x.izoh ?? '',
        city: x.city ?? x.shahar ?? '',
        category: x.category ?? x.tur ?? '',
        phone: x.phone ?? x.aloqa ?? x.tel ?? '',
        createdAt: x.createdAt ?? x.yaratilgan ?? null,
        status: x.status ?? 'active',
        user: x.user ?? { uid: x.uid ?? '', email: x.email ?? '', displayName: x.displayName ?? x.ism ?? '', photoURL: x.photoURL ?? '' },
        pinned: !!x.pinned
      };
    }

    function cardTpl(ad){
      const when = ad.createdAt?.toDate ? fmt.format(ad.createdAt.toDate()) : '';
      const typeBadge = ad.type==='lost'  ? 'warn' : (ad.type==='found' ? 'ok' : 'type');
      const statusTxt = ad.status==='removed' ? 'O‘chirilgan' : 'Faol';
      const pinTxt = ad.pinned ? '📍 Pinlangan' : '';
      return `
        <article class="admin-card" data-id="${ad.id}">
          <div class="admin-row">
            <span class="badge ${typeBadge}">${ad.type}</span>
            <span class="badge">${statusTxt}</span>
            ${pinTxt? `<span class="badge type">${pinTxt}</span>`:''}
            ${ad.city? `<span class="badge">📍 ${escapeHTML(ad.city)}</span>`:''}
            ${ad.category? `<span class="badge">🏷️ ${escapeHTML(ad.category)}</span>`:''}
          </div>
          <div class="title">${escapeHTML(ad.title)}</div>
          ${ad.desc ? `<div class="desc">${escapeHTML(ad.desc)}</div>`:''}
          <div class="hr"></div>
          <div class="meta">👤 ${escapeHTML(ad.user.displayName||'Noma’lum')} · ${escapeHTML(ad.user.email||'')}</div>
          <div class="meta">🆔 ${escapeHTML(ad.user.uid||'')}</div>
          ${when? `<div class="meta">🕒 ${when}</div>`:''}
          ${ad.phone? `<div class="meta">☎️ ${escapeHTML(ad.phone)}</div>`:''}
          <div class="card-actions">
            <button class="admin-btn danger" data-act="remove">🗑️ O‘chirish</button>
            <button class="admin-btn" data-act="restore">↩️ Qaytarish</button>
            <button class="admin-btn primary" data-act="pin">📌 Pin</button>
          </div>
        </article>
      `;
    }

    /* O‘chirish/Qaytarish/Pin */
    document.getElementById('admGrid').addEventListener('click', async (e)=>{
      const btn = e.target.closest('button[data-act]'); if(!btn) return;
      const card = btn.closest('.admin-card'); const id = card?.dataset.id;
      if(!id) return;
      const act = btn.dataset.act;
      try{
        if(act==='remove'){
          if(!confirm('Ushbu e’lonni o‘chirasizmi?')) return;
          await updateDoc(doc(db,'Elonlar',id), { status:'removed' });
        }else if(act==='restore'){
          await updateDoc(doc(db,'Elonlar',id), { status:'active' });
        }else if(act==='pin'){
          await updateDoc(doc(db,'Elonlar',id), { pinned:true, pinnedAt:new Date() });
          alert('E’lon pin qilindi.');
        }
        await renderAdmin();
      }catch(err){ alert('Amal bajarilmadi: '+err.message); }
    });

    /* Render */
    async function renderAdmin(){
      const $grid = document.getElementById('admGrid');
      $grid.innerHTML = '';
      try{
        const snap = await getDocs(query(collection(db,'Elonlar'), orderBy('createdAt','desc')));
        const list = [];
        snap.forEach(d=>list.push(normalizeAd(d.data(), d.id)));

        const q = ($search.value||'').toLowerCase().trim();
        const t = $typeSel.value; const s = $statSel.value;

        const filtered = list.filter(ad=>{
          if(t!=='all' && ad.type!==t) return false;
          if(s!=='all' && ad.status!==s) return false;
          if(!q) return true;
          const hay = [
            ad.title,ad.desc,ad.city,ad.category,ad.phone,
            ad.user?.email,ad.user?.displayName,ad.user?.uid
          ].join(' ').toLowerCase();
          return hay.includes(q);
        });

        $grid.innerHTML = filtered.length
          ? filtered.map(cardTpl).join('')
          : `<div class="meta" style="padding:.5rem 0;">Hech narsa topilmadi.</div>`;
      }catch(err){
        console.error(err); $grid.innerHTML = `<div class="meta">Xatolik: ${escapeHTML(err.message)}</div>`;
      }
    }

    /* Avtologin (ixtiyoriy): sahifa yuklanganda authni tayyorlab qo'yish */
    onAuthStateChanged(auth, u=>{ /* UI belgilarini keyin qo‘shsangiz bo‘ladi */ });

  </script>
</body>
</html>
