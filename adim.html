<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BINGO • Admin</title>
  <meta name="theme-color" content="#0f1623" />

  <!-- ====== STYLES: Full-screen Admin Layout ====== -->
  <style>
    :root{
      --bg:#0f1623;          /* panel fon */
      --ink:#e7edf7;         /* matn */
      --ink-dim:#a9b5c6;
      --card:#121a28;
      --soft:#1a2233;
      --accent:#ffd34d;
      --danger:#ff6b6b;
      --ok:#27c26a;
      --muted:#6e7a8f;
      --radius:18px;
      --rx:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      background:#f6e1a9;
      color:var(--ink);
      -webkit-font-smoothing:antialiased;
      font: 16px/1.45 system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }

    /* Shell */
    .admin-shell{
      min-height:100vh;
      width:100%;
      padding:16px env(safe-area-inset-right) 24px env(safe-area-inset-left);
      background:var(--bg);
      border-radius:24px 24px 0 0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    /* Top bar */
    .topbar{
      display:flex; align-items:center; gap:12px; flex-wrap:wrap;
      justify-content:space-between;
      padding:8px 4px 0;
    }
    .brand{ display:flex; gap:10px; align-items:center; }
    .badge{
      background:linear-gradient(135deg,#3a4b6a,#172033);
      color:#fff; padding:8px 12px; border-radius:10px; font-weight:700; letter-spacing:.3px;
      border:1px solid rgba(255,255,255,.08)
    }

    /* Toolbar */
    .toolbar{
      display:grid; gap:10px;
      grid-template-columns: 1fr;
      padding: 4px 0 8px;
    }
    @media(min-width:850px){
      .toolbar{ grid-template-columns: 1.2fr .9fr .9fr auto auto; align-items:end; }
    }

    .pill, .btn{
      display:inline-flex; align-items:center; gap:8px;
      padding:10px 14px; border-radius:999px; border:1px solid rgba(255,255,255,.12);
      background:#0f1623; color:var(--ink); font-weight:600; text-decoration:none; outline:none;
    }
    .pill input, .pill select{
      background:transparent; border:0; color:var(--ink); font-weight:600; outline:none;
      width:100%;
    }
    .pill{ background:#10192a }
    .btn{ background:var(--soft) }
    .btn.ok{ background:var(--ok); color:#062212; border-color:transparent }
    .btn.warn{ background:var(--danger); color:#2a0b0b; border-color:transparent }
    .btn.accent{ background:var(--accent); color:#241b00; border-color:transparent }
    .btn:active{ transform:translateY(1px) }

    .muted{ color:var(--ink-dim) }
    .hr{ height:1px; background:rgba(255,255,255,.06); margin:2px 0 8px }

    /* Grid of cards */
    .grid{ display:grid; gap:14px; grid-template-columns:repeat(1,minmax(0,1fr)); }
    @media(min-width:760px){ .grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media(min-width:1120px){ .grid{ grid-template-columns:repeat(3,minmax(0,1fr)); } }

    /* Card */
    .card{
      background:var(--card); border:1px solid rgba(255,255,255,.07);
      border-radius:var(--radius); padding:14px; display:flex; flex-direction:column; gap:10px;
      min-height:140px;
    }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
    .grow{ flex:1 1 auto }
    .tag{ padding:4px 10px; border-radius:999px; font-size:.8rem; font-weight:700; border:1px solid rgba(255,255,255,.15); }
    .tag.lost{ color:#ffb4b4; border-color:#ffb4b4 }
    .tag.found{ color:#9ff3c7; border-color:#9ff3c7 }
    .tag.reward{ color:#ffe38f; border-color:#ffe38f }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

    .title{ font-size:1.02rem; font-weight:800; letter-spacing:.2px }
    .meta{ color:var(--ink-dim); font-size:.92rem }
    .small{ font-size:.85rem }
    .nowrap{ white-space:nowrap; overflow:hidden; text-overflow:ellipsis }

    .empty{
      color:var(--ink-dim); text-align:center; padding:32px 12px;
      border:1px dashed rgba(255,255,255,.15); border-radius:var(--radius);
      background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);
    }

    .chip{
      border:1px solid rgba(255,255,255,.14);
      border-radius: 8px; padding:4px 8px; font-weight:700; background:rgba(255,255,255,.03);
    }

    .footerbar{
      display:flex; justify-content:space-between; align-items:center;
      padding:8px 4px 2px; color:var(--ink-dim); font-size:.92rem;
    }
  </style>
</head>

<body>
  <main class="admin-shell">

    <section class="topbar">
      <div class="brand">
        <span class="badge">🛡️ Admin</span>
        <div id="whoami" class="muted small">Kirish kutilmoqda…</div>
      </div>
      <div class="row">
        <button id="btnSign" class="btn accent">🔐 Google bilan kirish</button>
        <button id="btnOut" class="btn" style="display:none">🚪 Chiqish</button>
      </div>
    </section>

    <div class="hr"></div>

    <!-- ===== Toolbar / filters ===== -->
    <section class="toolbar">
      <label class="pill row">
        <span>🔄</span>
        <button id="btnRefresh" class="btn">Yangilash</button>
      </label>

      <label class="pill row">
        <span>📦 Turi</span>
        <select id="typeSel">
          <option value="all">Hammassi</option>
          <option value="lost">Yo‘qotdim</option>
          <option value="found">Topdim</option>
          <option value="reward">Mukofotli</option>
        </select>
      </label>

      <label class="pill row">
        <span>🏙️ Shahar</span>
        <input id="cityInp" placeholder="masalan: Toshkent" />
      </label>

      <label class="pill row">
        <span>🔎 Qidirish</span>
        <input id="qInp" placeholder="sarlavha, email, uid" />
      </label>

      <div class="row" style="gap:8px">
        <button id="btnExport" class="btn">⬇️ CSV</button>
        <span class="chip">Jami: <b id="count">0</b></span>
      </div>
    </section>

    <!-- ===== List ===== -->
    <section id="list" class="grid" aria-live="polite">
      <div class="empty">Ma’lumot yo‘q. Filtrlarni o‘zgartiring yoki kuting…</div>
    </section>

    <div class="footerbar">
      <span>© BINGO — Admin boshqaruvi</span>
      <span id="liveInfo" class="muted">Live: ulangan emas</span>
    </div>
  </main>

  <!-- ===== Firebase CDN ===== -->
  <script type="module">
    /* --------------- Firebase init --------------- */
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
    import {
      getAuth,
      GoogleAuthProvider,
      signInWithPopup,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
    import {
      getFirestore,
      collection, doc, getDoc, getDocs, onSnapshot,
      query, where, orderBy, limit, deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

    // TODO: Firebase configingizni shu yerga qo'ying
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_BUCKET",
      messagingSenderId: "YOUR_SENDER_ID",
      appId: "YOUR_APP_ID",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const provider = new GoogleAuthProvider();

    /* --------- DOM qismlar --------- */
    const who = document.getElementById('whoami');
    const btnSign = document.getElementById('btnSign');
    const btnOut  = document.getElementById('btnOut');
    const listEl  = document.getElementById('list');
    const countEl = document.getElementById('count');
    const liveInfo= document.getElementById('liveInfo');

    const typeSel = document.getElementById('typeSel');
    const cityInp = document.getElementById('cityInp');
    const qInp    = document.getElementById('qInp');
    const btnRefresh = document.getElementById('btnRefresh');
    const btnExport  = document.getElementById('btnExport');

    /* --------- Kolleksiya nomlari --------- */
    const POSTS_COL = 'elonlar';    // sizning asosiy e’lonlar kolleksiyangiz
    const RULES_COL = 'rules';      // adminFlag shu yerda: rules/{uid} => {admin:true}

    /* --------- Global holat --------- */
    let currentUser = null;
    let isAdmin = false;
    let unsub = null;          // live listener

    /* --------- UI util --------- */
    const fmtTime = ts => {
      try{
        const d = ts?.toDate ? ts.toDate() : new Date(ts);
        return new Intl.DateTimeFormat('uz-UZ', {dateStyle:'medium', timeStyle:'short'}).format(d);
      }catch(_){ return '—'; }
    }
    const el = (tag, attrs={}, ...children) => {
      const n = document.createElement(tag);
      for(const k in attrs){
        if(k.startsWith('on') && typeof attrs[k]==='function'){
          n.addEventListener(k.slice(2), attrs[k]);
        } else if(attrs[k]===true){ n.setAttribute(k,''); }
        else if(attrs[k]!==false && attrs[k]!=null){ n.setAttribute(k, attrs[k]); }
      }
      for(const c of children){
        if(c==null) continue;
        n.appendChild(typeof c==='string' ? document.createTextNode(c) : c);
      }
      return n;
    };

    /* --------- Auth --------- */
    btnSign.onclick = () => signInWithPopup(auth, provider).catch(e=>alert(e.message));
    btnOut.onclick  = () => signOut(auth);

    async function checkAdmin(uid){
      if(!uid) return false;
      const snap = await getDoc(doc(db, RULES_COL, uid));
      return !!(snap.exists() && snap.data().admin===true);
    }

    onAuthStateChanged(auth, async (user)=>{
      currentUser = user;
      if(!user){
        who.textContent = 'Kirish kutilmoqda…';
        btnSign.style.display='inline-flex';
        btnOut.style.display='none';
        isAdmin = false;
        setListEmpty('Admin uchun kirish talab qilinadi.');
        detachLive();
        return;
      }
      who.innerHTML = `👤 ${user.displayName || 'Foydalanuvchi'} · <span class="mono small">${user.email}</span>`;
      btnSign.style.display='none';
      btnOut.style.display='inline-flex';

      isAdmin = await checkAdmin(user.uid);
      if(!isAdmin){
        setListEmpty('❌ Sizda admin huquqi yo‘q.');
        detachLive();
        return;
      }
      // Admin — live ulanamiz
      attachLive();
    });

    /* --------- Live listeners --------- */
    function detachLive(){
      if(typeof unsub === 'function'){ unsub(); unsub=null; }
      liveInfo.textContent = 'Live: ulangan emas';
    }

    function attachLive(){
      detachLive();
      const constraints = [];
      // type filter
      const t = typeSel.value;
      if(t!=='all'){ constraints.push(where('type','==', t)); }
      // city filter: oddiy equal emas, qidiruv bilan keyin filtrlaymiz (client side) —
      // illat: Firestore’da LIKE yo‘q. Shuning uchun cityInp Pro qidiruv emas, post-render filtrda.
      // Eng to‘g‘risi — normalizedCity maydoni va indexlar bilan ishlash. Hozircha client-side.

      const q = query(
        collection(db, POSTS_COL),
        ...constraints,
        orderBy('createdAt','desc'),
        limit(400) // xavfsiz limit
      );

      unsub = onSnapshot(q, (snap)=>{
        const items = [];
        snap.forEach(d=> items.push({ id:d.id, ...d.data() }));
        renderList(items);
        liveInfo.textContent = `Live: ${new Date().toLocaleTimeString('uz-UZ')} da yangilandi`;
      }, (err)=>{
        setListEmpty('Xatolik: '+err.message);
        console.error(err);
      });
    }

    /* --------- Render --------- */
    function setListEmpty(text){
      listEl.innerHTML='';
      listEl.appendChild(el('div',{class:'empty'}, text));
      countEl.textContent = '0';
    }

    function renderList(all){
      // Client-side filtrlar: city va qidiruv
      const city = (cityInp.value||'').trim().toLowerCase();
      const qtxt = (qInp.value||'').trim().toLowerCase();

      let rows = all.filter(x=>{
        let ok = true;
        if(city){
          ok = (x.city||'').toLowerCase().includes(city);
          if(!ok) return false;
        }
        if(qtxt){
          const hay = [
            x.title, x.desc, x.city, x.email, x.uid, x.phone, x.type, x.rewardText
          ].join(' ').toLowerCase();
          ok = hay.includes(qtxt);
        }
        return ok;
      });

      countEl.textContent = String(rows.length);

      if(rows.length===0){
        setListEmpty('Mos keladigan e’lon topilmadi.');
        return;
      }

      listEl.innerHTML='';
      for(const p of rows){
        const tagClass = p.type==='found'?'found':(p.type==='reward'?'reward':'lost');
        const tagLabel = p.type==='found'?'Topdim':(p.type==='reward'?'Mukofotli':'Yo‘qotdim');

        const top = el('div',{class:'row'},
          el('span',{class:`tag ${tagClass}`}, tagLabel),
          p.pinned ? el('span',{class:'tag', title:'Yopishtirilgan'}, '📌 PIN') : null,
          el('span',{class:'title grow nowrap', title:p.title||''}, p.title || '—'),
        );

        const meta1 = el('div',{class:'meta nowrap'},
          `🏙️ ${p.city || '—'}  ·  📞 ${p.phone || '—'}  ·  🕒 ${fmtTime(p.createdAt)}`
        );

        const meta2 = el('div',{class:'small muted nowrap'},
          `👤 ${p.authorName || p.email || '—'}  ·  uid: `,
          el('span',{class:'mono'}, p.uid || '—')
        );

        const actions = el('div',{class:'row'},
          el('button',{class:'btn warn', onClick:()=>confirmDelete(p)}, '🗑️ O‘chirish'),
          el('button',{class:'btn', onClick:()=>openPost(p)}, '🔗 Ochish')
        );

        const card = el('div',{class:'card'},
          top,
          meta1,
          meta2,
          p.reward ? el('div',{class:'chip'}, `🎁 Mukofot: ${p.rewardText || p.reward} `): null,
          el('div',{class:'row'}, actions)
        );

        listEl.appendChild(card);
      }
    }

    function openPost(p){
      // agar frontdagi post URLingiz bo‘lsa shu yerga qo‘ying
      // masalan: /?post={id}
      const u = new URL(location.origin);
      u.searchParams.set('post', p.id);
      window.open(u.toString(), '_blank');
    }

    async function confirmDelete(p){
      if(!isAdmin) return alert('Admin emas');
      const ok = confirm(`🗑️ ROSTAN ham o‘chirasizmi?\n\nSarlavha: ${p.title||'—'}\nMuallif: ${p.email||p.uid||'—'}`);
      if(!ok) return;
      try{
        await deleteDoc(doc(db, POSTS_COL, p.id));
        // o‘chirilgach, onSnapshot o‘zi yangilanadi
      }catch(e){
        alert('O‘chirishda xato: '+e.message);
      }
    }

    /* --------- Export CSV --------- */
    async function exportCSV(){
      try{
        // Hozirgi filtrlar bilan emas, balki serverdan cheklangan ko‘plab maydonlarni olib, keyin filtrlaymiz
        const constraints = [];
        const t = typeSel.value;
        if(t!=='all'){ constraints.push(where('type','==', t)); }
        const qy = query(collection(db, POSTS_COL), ...constraints, orderBy('createdAt','desc'), limit(1000));
        const snap = await getDocs(qy);
        const rows = [];
        snap.forEach(d=> rows.push({ id:d.id, ...d.data() }));

        // Client side filtrlar
        const city = (cityInp.value||'').trim().toLowerCase();
        const qtxt = (qInp.value||'').trim().toLowerCase();
        const filtered = rows.filter(x=>{
          let ok=true;
          if(city){ ok=(x.city||'').toLowerCase().includes(city); if(!ok)return false; }
          if(qtxt){
            const hay = [
              x.title, x.desc, x.city, x.email, x.uid, x.phone, x.type
            ].join(' ').toLowerCase();
            ok = hay.includes(qtxt);
          }
          return ok;
        });

        const header = ['id','type','title','city','phone','email','uid','createdAt','reward','pinned'];
        const lines = [
          header.join(',')
        ];
        for(const p of filtered){
          const cols = [
            p.id,
            p.type||'',
            (p.title||'').replaceAll(',',' '),
            (p.city||'').replaceAll(',',' '),
            (p.phone||'').replaceAll(',',' '),
            p.email||'',
            p.uid||'',
            p.createdAt?.toDate ? p.createdAt.toDate().toISOString() : '',
            (p.rewardText||p.reward||'').toString().replaceAll(',',' '),
            p.pinned? '1':'0'
          ];
          lines.push(cols.map(v=>`"${String(v).replaceAll('"','""')}"`).join(','));
        }
        const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `elonlar_export_${Date.now()}.csv`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
      }catch(e){
        alert('Ekportda xato: '+e.message);
      }
    }

    /* --------- Events --------- */
    btnRefresh.addEventListener('click', attachLive);
    typeSel.addEventListener('change', attachLive);
    cityInp.addEventListener('input', debounce(renderCurrent, 300));
    qInp.addEventListener('input', debounce(renderCurrent, 300));
    btnExport.addEventListener('click', exportCSV);

    function renderCurrent(){
      // mavjud snapshot’dan qayta chizish uchun: unsub bilan ma’lumot saqlamayapmiz,
      // shuning uchun eng yaqin yo‘l — qayta attachLive(); ammo inputda ko‘p so‘rov yubormaslik uchun
      // qidiruvni client-side ishlatadigan bo‘ldik: snapshot ma’lumotini saqlash kerak bo‘ladi.
      // Soddaroq yo‘l: attachLive() ni qayta chaqirmaymiz, so‘nggi snapshotni cache qilamiz.
    }

    // sodda debounce
    function debounce(fn, t=250){
      let id; return (...args)=>{ clearTimeout(id); id=setTimeout(()=>fn.apply(null,args), t); }
    }

    // Qisqa kesh (oxirgi snapshotni saqlash) — attachLive ichida yangilab turishimiz kerak edi.
    // Yuqoridagi “renderCurrent” ni minimal o'zgartirishsiz ishlatish uchun kichik patch:
    let lastItems = [];
    function renderListPatched(items){
      lastItems = items;
      renderList(items);
    }
    // attachLive ichida renderList o‘rniga patchni qo‘llaymiz — funksiyani qayta aniqlaymiz:
    const _attachLive = attachLive;
    attachLive = function(){
      detachLive();
      const constraints = [];
      const t = typeSel.value;
      if(t!=='all'){ constraints.push(where('type','==', t)); }
      const qy = query(collection(db, POSTS_COL), ...constraints, orderBy('createdAt','desc'), limit(400));
      unsub = onSnapshot(qy, (snap)=>{
        const items = [];
        snap.forEach(d=> items.push({ id:d.id, ...d.data() }));
        renderListPatched(items);
        liveInfo.textContent = `Live: ${new Date().toLocaleTimeString('uz-UZ')} da yangilandi`;
      }, (err)=>{
        setListEmpty('Xatolik: '+err.message);
        console.error(err);
      });
    }
    renderCurrent = function(){
      renderList(lastItems || []);
    }

  </script>
</body>
</html>
