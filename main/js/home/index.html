<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BINGO — Asosiy sahifa</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    /* Minimal ichki uslub (asosiy ko'rinish), xohlasangiz css/style.css ichida chiroyliroq qilasiz */
    :root{--bg:#f9e7b7;--card:#0f1a28;--fg:#eaf2ff;--muted:#9fb0c9;--accent:#ffb703;--red:#e63946;--green:#2a9d8f}
    html,body{margin:0;height:100%;background:var(--bg);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    .container{max-width:960px;margin:0 auto;padding:16px}
    header{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px}
    .brand{font-weight:800;font-size:22px}
    .row{display:flex;gap:12px;flex-wrap:wrap}
    .ad{flex:1 1 100%;background:#122033;color:#fff;border-radius:14px;padding:8px 12px}
    .ad img{width:100%;border-radius:12px;display:block}
    .controls{flex:1 1 100%;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    select,button,input,textarea{font:inherit}
    .btn{border:0;border-radius:12px;padding:10px 14px;background:#213147;color:#fff}
    .btn.primary{background:var(--green)}
    .btn.danger{background:var(--red)}
    #elon-list{margin-top:12px;display:grid;gap:12px}
    .card{background:var(--card);color:var(--fg);border-radius:16px;padding:14px}
    .card-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
    .badge{font-size:18px}
    .title{margin:0;font-size:18px}
    .muted{color:var(--muted);font-size:13px;margin-top:6px}
    .card-foot{margin-top:10px;display:flex;gap:8px}
    .empty,.loading{padding:18px;text-align:center;color:#223}
    .tools{display:flex;gap:8px;align-items:center}
    .login-tools{display:flex;gap:8px}
    form#form-new{display:none;background:#132033;color:#eaf2ff;border-radius:14px;padding:12px;margin-top:10px}
    body.authed form#form-new{display:block}
    form#form-new .row>*{flex:1 1 280px}
    input[type=text],textarea,select{width:100%;padding:10px;border-radius:10px;border:1px solid #223;background:#0b1623;color:#fff}
    textarea{min-height:80px;resize:vertical}
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="brand">🧩 BINGO</div>
      <div class="login-tools">
        <button id="btn-login" class="btn">Google bilan kirish</button>
        <button id="btn-logout" class="btn danger">Chiqish</button>
      </div>
    </header>

    <!-- Reklama blok (rasm/banerni images/ ichidan qo'ying) -->
    <section class="ad">
      <img src="../images/reklama-1.jpg" alt="Reklama">
      <div class="muted">⭐ Bu yerda sizning reklamangiz bo‘lishi mumkin</div>
    </section>

    <!-- Asosiy boshqaruvlar -->
    <section class="controls">
      <div class="tools">
        <select id="filter" title="Filtr">
          <option value="all">Hammasi</option>
          <option value="yoqotdim">❗ Yo‘qotdim</option>
          <option value="topdim">✅ Topdim</option>
        </select>
        <button id="btn-refresh" class="btn" onclick="location.reload()">🔄 Yangilash</button>
        <a class="btn" href="../admin/index.html">🛡 Admin</a>
      </div>
    </section>

    <!-- Yangi e’lon formasi (faqat kirganlarga ko‘rinadi) -->
    <form id="form-new">
      <h3 style="margin:0 0 8px 0;">Yangi e’lon</h3>
      <div class="row">
        <div>
          <label>Sarlavha</label>
          <input type="text" name="title" placeholder="Telefon, pasport, kalit…">
        </div>
        <div>
          <label>Shahar</label>
          <input type="text" name="city" placeholder="Toshkent">
        </div>
        <div>
          <label>Telefon</label>
          <input type="text" name="phone" placeholder="+998…">
        </div>
        <div>
          <label>Tur</label>
          <select name="type">
            <option value="yoqotdim">Yo‘qotdim</option>
            <option value="topdim">Topdim</option>
          </select>
        </div>
        <div style="flex:1 1 100%">
          <label>Tavsif</label>
          <textarea name="desc" placeholder="Qisqacha izoh yozing…"></textarea>
        </div>
      </div>
      <div style="margin-top:8px">
        <button class="btn primary" type="submit">➕ E’lon qo‘shish</button>
      </div>
    </form>

    <!-- E’lonlar ro‘yxati -->
    <section id="elon-list" aria-live="polite"></section>

    <!-- Pastdagi reklama (ixtiyoriy) -->
    <section class="ad" style="margin-top:14px">
      <img src="../images/reklama-2.jpg" alt="Reklama 2">
    </section>

    <footer class="muted" style="text-align:center;margin-top:20px">
      © 2025 BINGO — Oddiy forma, tez natija.
    </footer>
  </div>

  <!-- Asosiy JS -->
  <script type="module" src="../js/app.js"></script>
</body>
</html>
