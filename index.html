<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BINGO — Yo‘qoldi/Topildi</title>
  <meta name="theme-color" content="#f59e0b" />
  <link rel="manifest" href="manifest.webmanifest" />
  <style>
    :root{
      --bg:#FFF7D6; --card:#fff; --text:#1e293b; --muted:#475569; --brand:#f59e0b;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;color:var(--text);background:var(--bg)}
    .wrap{max-width:900px;margin:0 auto;padding:18px}
    .topbar{position:sticky;top:0;z-index:10;background:linear-gradient(180deg, rgba(255,247,214,.95), rgba(255,247,214,.6) 60%, transparent)}
    .brand{display:flex;gap:10px;align-items:center}
    .logo{width:36px;height:36px;border-radius:10px;background:#111;color:#fff;font-weight:800;display:grid;place-items:center}
    h1{margin:0;font-size:22px}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    @media (min-width:720px){ .grid{grid-template-columns:1fr 1fr} }
    .card{background:var(--card);border:1px solid #e2e8f0;border-radius:14px;padding:14px;box-shadow:0 4px 14px rgba(2,8,23,.04)}
    label{font-size:13px;color:var(--muted);display:block;margin:8px 0 6px}
    input,select,textarea{width:100%;padding:12px 12px;border-radius:12px;border:1px solid #e2e8f0;background:#fff;font-size:15px;outline:0}
    textarea{min-height:92px;resize:vertical}
    button{cursor:pointer;border:0;padding:12px 16px;border-radius:12px;background:var(--brand);color:#111;font-weight:800}
    .btn-row{display:flex;gap:10px;align-items:center}
    .pill{font-size:12px;padding:4px 8px;border-radius:999px;background:#fef3c7;border:1px solid #fde68a;display:inline-block}
    .item{display:grid;gap:4px}
    .muted{color:var(--muted);font-size:13px}
    .empty{opacity:.6;text-align:center;padding:18px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar card" style="margin-bottom:12px">
      <div class="brand">
        <div class="logo">BG</div>
        <div>
          <h1>BINGO — Yo‘qoldi / Topildi</h1>
          <div class="muted">Oddiy forma, tez natija. E’lonlar Firebase’da saqlanadi.</div>
        </div>
      </div>
    </div>

    <!-- Forma -->
    <div class="card">
      <div class="grid">
        <div>
          <label for="status">Holati</label>
          <select id="status">
            <option value="yoqotdim">Yo‘qotdim</option>
            <option value="topdim">Topdim</option>
          </select>
        </div>
        <div>
          <label for="city">Shahar</label>
          <input id="city" placeholder="Masalan: Toshkent" />
        </div>
        <div>
          <label for="title">Nima?</label>
          <input id="title" placeholder="Masalan: Pasport / Telefon / Sumka..." />
        </div>
        <div>
          <label for="phone">Telefon</label>
          <input id="phone" placeholder="+998 XX XXX XX XX" />
        </div>
        <div class="grid" style="grid-column:1/-1">
          <div>
            <label for="desc">Qo‘shimcha ma’lumot (ixtiyoriy)</label>
            <textarea id="desc" placeholder="Rangi, joyi, vaqti va hok."></textarea>
          </div>
        </div>
      </div>
      <div class="btn-row" style="margin-top:10px">
        <button id="saveBtn">E’lon joylash</button>
        <span class="muted" id="statusMsg"></span>
      </div>
    </div>

    <!-- Ro'yxat -->
    <div class="card" style="margin-top:12px">
      <div class="btn-row" style="justify-content:space-between;margin-bottom:8px">
        <b>So‘nggi e’lonlar</b>
        <span class="pill" id="counter">0 ta</span>
      </div>
      <div id="list"></div>
      <div id="empty" class="empty">Hozircha e’lon yo‘q. Birinchi bo‘lib joylang ✨</div>
    </div>
  </div>

  <!-- Firebase + Firestore -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, addDoc, serverTimestamp,
      query, orderBy, onSnapshot
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    // ⚙️ Sizning Firebase config’ingiz
    const firebaseConfig = {
      apiKey: "AlzaSyDw3_0AXL8J2N4dz1my_1XBuw1eV08x31o",
      authDomain: "topildi.firebaseapp.com",
      projectId: "topildi",
      storageBucket: "topildi.appspot.com",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a"
    };

    const app = initializeApp(firebaseConfig);
    const db  = getFirestore(app);

    // Elementlar
    const el = (id) => document.getElementById(id);
    const title = el("title"), phone = el("phone"), city = el("city"),
          statusSel = el("status"), desc = el("desc"),
          list = el("list"), empty = el("empty"), statusMsg = el("statusMsg"), counter = el("counter");

    // ✅ E’lon saqlash
    el("saveBtn").addEventListener("click", async () => {
      const data = {
        status: statusSel.value.trim(),
        city: city.value.trim(),
        title: title.value.trim(),
        phone: phone.value.trim(),
        desc: desc.value.trim(),
        createdAt: serverTimestamp()
      };
      // Sodda tekshiruv
      if (!data.city || !data.title || !data.phone) {
        statusMsg.textContent = "Maydonlarni to‘liq kiriting.";
        return;
      }
      statusMsg.textContent = "Saqlanmoqda...";
      try {
        await addDoc(collection(db, "Elonlar"), data);
        statusMsg.textContent = "✅ Saqlandi!";
        title.value = ""; desc.value = "";
      } catch (e) {
        statusMsg.textContent = "❌ Xatolik: " + e.message;
      }
    });

    // 🔄 Ro‘yhatni jonli tinglash
    const q = query(collection(db, "Elonlar"), orderBy("createdAt", "desc"));
    onSnapshot(q, (snap) => {
      list.innerHTML = "";
      let count = 0;
      snap.forEach(doc => {
        count++;
        const d = doc.data();
        const when = d.createdAt?.toDate ? d.createdAt.toDate().toLocaleString() : "—";
        list.innerHTML += `
          <div class="item card" style="margin:10px 0;padding:12px">
            <div class="btn-row" style="justify-content:space-between">
              <span class="pill">${d.status === "topdim" ? "Topdim" : "Yo‘qotdim"}</span>
              <span class="muted">${when}</span>
            </div>
            <div><b>${d.title || ""}</b></div>
            <div class="muted">${d.city || ""}</div>
            ${d.desc ? `<div style="margin-top:6px">${d.desc}</div>` : ""}
            <div style="margin-top:6px">📞 <a href="tel:${d.phone}">${d.phone}</a></div>
          </div>
        `;
      });
      empty.style.display = count ? "none" : "block";
      counter.textContent = count + " ta";
    });
  </script>
</body>
</html>
