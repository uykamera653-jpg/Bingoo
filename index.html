<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>BINGO — Kirish (Google bilan)</title>
  <meta name="theme-color" content="#f59e0b" />
  <style>
    :root{
      --bg1:#FFF7D6; --bg2:#FFE59A;
      --brand:#f59e0b; --ink:#0f172a;
      --panel:#0f172a; --ring:#223047;
      --muted:#475569; --good:#16a34a; --bad:#dc2626;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Roboto}
    body{background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--ink)}
    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 40px}
    .topbar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(255,243,204,.92),rgba(255,236,173,.78));border-bottom:1px solid #f1d28a}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:#fff3c4;border:1px solid #f1d28a;font-weight:900;color:#b45309}
    .title{font-weight:800;letter-spacing:.2px}
    .profile{display:flex;align-items:center;gap:10px}
    .avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid #f1d28a;background:#fff}
    .btn{border-radius:14px;padding:12px 16px;border:1px solid #e2e8f0;background:#111a2b;color:#e5eef7;font-weight:700;cursor:pointer}
    .btn.alt{background:#fff;color:#0f172a;border-color:#e2e8f0}
    .btn.good{background:var(--good)} .btn.bad{background:var(--bad)}
    .hero{margin:24px 0 14px}
    .headline{font-size:34px;line-height:1.25;font-weight:900}
    .muted{color:#475569;margin-top:6px}
    .card{background:var(--panel);color:#e5eef7;border:1px solid var(--ring);border-radius:18px;padding:14px;margin:16px 0}
    .alert{display:none;margin:10px 0;background:#dc2626;color:#fff;padding:12px;border-radius:12px;font-weight:700;white-space:pre-wrap}
    .ok{background:#16a34a}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .hidden{display:none !important}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="hdr">
      <div class="brand">
        <div class="logo">BG</div>
        <div class="title">BINGO</div>
      </div>
      <div class="profile" id="profileBox">
        <!-- auth holatiga qarab JS to‘ldiradi -->
        <button id="googleLoginBtn" class="btn">🔑 Google bilan kirish</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div id="banner" class="alert" role="alert"></div>

    <div class="hero">
      <div class="headline">Yo‘qotdingizmi yoki topdingizmi? E’lon qoldiring.</div>
      <div class="muted">“Halollik — eng katta mukofot.”</div>
    </div>

    <div class="card">
      <b>Kirish</b>
      <p style="margin:8px 0 12px;color:#cbd5e1">Hisobga kirish uchun quyidagi tugmani bosing. Agar ruxsat berilmagan domen xatosi chiqsa — Firebase’dagi <i>Authentication → Settings → Authorized domains</i> ga saytingiz domenini qo‘shing.</p>
      <div class="row">
        <button id="loginBtn2" class="btn">🔐 Google bilan kirish</button>
        <button id="logoutBtn" class="btn alt hidden">↩️ Chiqish</button>
      </div>
    </div>

    <div class="card hidden" id="meCard">
      <b>Mening profilim</b>
      <div class="row" style="align-items:center;margin-top:10px">
        <img id="meAvatar" class="avatar" alt="">
        <div id="meText"></div>
      </div>
    </div>
  </div>

  <!-- Firebase (modular, CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
    import {
      getAuth, GoogleAuthProvider, signInWithPopup,
      onAuthStateChanged, signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // ✅ Siz bergan config
    const firebaseConfig = {
      apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
      authDomain: "topildi.firebaseapp.com",
      databaseURL: "https://topildi-default-rtdb.firebaseio.com",
      projectId: "topildi",
      storageBucket: "topildi.firebasestorage.app",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
      measurementId: "G-NKCMKCXZQ7"
    };

    // Init
    const app = initializeApp(firebaseConfig);
    getAnalytics(app); // optional
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // UI refs
    const banner = document.getElementById('banner');
    const profileBox = document.getElementById('profileBox');
    const googleBtn = document.getElementById('googleLoginBtn');
    const loginBtn2 = document.getElementById('loginBtn2');
    const logoutBtn = document.getElementById('logoutBtn');
    const meCard = document.getElementById('meCard');
    const meText = document.getElementById('meText');
    const meAvatar = document.getElementById('meAvatar');

    function showBanner(msg, ok=false){
      banner.textContent = msg;
      banner.classList.toggle('ok', ok);
      banner.style.display = msg ? 'block' : 'none';
    }

    async function doGoogleLogin(){
      showBanner('');
      try{
        const res = await signInWithPopup(auth, provider);
        const user = res.user;
        showBanner('Kirish muvaffaqiyatli ✅', true);
        console.log('Signed in:', user.uid, user.email);
      }catch(e){
        console.error(e);
        // Authorized domain xatosini foydalanuvchiga tushunarli ko‘rsatamiz
        if(String(e.message).includes('auth/unauthorized-domain')){
          showBanner(
            'Firebase: Ushbu domen OAuth uchun ruxsat etilmagan (auth/unauthorized-domain).\n' +
            '- Firebase Console → Authentication → Settings → Authorized domains ga saytingiz domenini qo‘shing.\n' +
            `- Sizning domeningiz: ${location.hostname}`
          );
        }else{
          showBanner('Xato: ' + e.message);
        }
      }
    }

    googleBtn.addEventListener('click', doGoogleLogin);
    loginBtn2.addEventListener('click', doGoogleLogin);
    logoutBtn.addEventListener('click', async()=>{
      showBanner('');
      await signOut(auth);
      showBanner('Hisobdan chiqildi.', true);
    });

    // Auth holatini kuzatish
    onAuthStateChanged(auth, (user)=>{
      if(user){
        // headerdagi profil
        profileBox.innerHTML = `
          <img class="avatar" src="${user.photoURL || ''}" alt="">
          <div style="font-weight:800">${user.displayName || user.email}</div>
        `;
        // kartochka
        meCard.classList.remove('hidden');
        logoutBtn.classList.remove('hidden');
        meText.innerHTML = `
          <div style="font-size:18px;font-weight:800">${user.displayName || 'Ism kiritilmagan'}</div>
          <div style="opacity:.8">${user.email || ''}</div>
          <div style="opacity:.7">UID: ${user.uid}</div>
        `;
        meAvatar.src = user.photoURL || '';
      }else{
        // headerda login tugmasi
        profileBox.innerHTML = `<button id="googleLoginBtn2" class="btn">🔑 Google bilan kirish</button>`;
        document.getElementById('googleLoginBtn2').addEventListener('click', doGoogleLogin);
        meCard.classList.add('hidden');
        logoutBtn.classList.add('hidden');
      }
    });
  </script>
</body>
</html>
