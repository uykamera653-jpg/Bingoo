<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>BINGO — Yo‘qoldi/Topildi</title>
<meta name="theme-color" content="#f8c100"/>
<link rel="manifest" href='data:application/manifest+json,{"name":"BINGO — Yo‘qoldi/Topildi","short_name":"BINGO","start_url":"./","display":"standalone","background_color":"#fff9db","theme_color":"#f8c100","icons":[]}'/>
<style>
  :root{
    --bg1:#FFF9DB; --bg2:#FFF1B8;
    --panel:#0f172a; --ring:#e5e7eb33; --text:#0F172A;
    --blue:#1e293b; --green:#16A34A; --red:#DC2626; --amber:#f8c100;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Roboto}
  body{background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
  .topbar{position:sticky;top:0;z-index:80;background:#fff9db;border-bottom:1px solid #f1d28a;padding:6px 10px;display:flex;justify-content:space-between;align-items:center}
  .brand{display:flex;align-items:center;gap:8px}
  .logo{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;background:#fff3c4;border:1px solid #f1d28a;font-weight:900;color:#b45309}
  .title{font-weight:800;color:#111827}
  .iconbtn{padding:6px 10px;border-radius:10px;background:#fff3c4;border:1px solid #f1d28a;cursor:pointer}
  .btn{border-radius:12px;padding:10px 14px;cursor:pointer;border:1px solid #e2e8f0;background:#111a2b;color:#fff;font-weight:700}
  .btn-red{background:var(--red)} .btn-green{background:var(--green)} .btn-blue{background:var(--blue)} .btn-amber{background:var(--amber);color:#111}
  .view{display:none} .view.active{display:block}
  .card{background:var(--panel);border:1px solid var(--ring);border-radius:14px;padding:12px;margin:10px 0;color:#fff}
  input,textarea{width:100%;background:#0b1220;color:#eef4fa;border:1px solid #223047;border-radius:10px;padding:10px}
  .post-card{background:#0f172a;border:1px solid #223047;border-radius:14px;padding:12px;margin:10px 0}
  .footer{text-align:center;margin:20px;font-size:13px}
</style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><div class="logo">BG</div><div class="title">BINGO</div></div>
    <div>
      <button id="homeBtn" class="iconbtn">⌂</button>
      <button id="userBtn" class="iconbtn">👤</button>
    </div>
  </div>

  <div class="wrap">
    <div class="views">
      <!-- HOME -->
      <section id="view_home" class="view active">
        <h2>Yo‘qotdingizmi yoki topdingizmi?</h2>
        <button class="btn btn-red" data-nav="lostForm">❗ Yo‘qotdim</button>
        <button class="btn btn-green" data-nav="foundForm">✅ Topdim</button>
        <button class="btn btn-blue" data-nav="lostList">📋 Yo‘qotilganlar</button>
        <button class="btn btn-blue" data-nav="foundList">🔎 Topilganlar</button>
        <button class="btn btn-blue" data-nav="profile">👤 Profil</button>
      </section>

      <!-- LOST FORM -->
      <section id="view_lostForm" class="view">
        <div class="card">
          <h3>Yo‘qotdim — e’lon</h3>
          <input id="l_item" placeholder="Narsa (masalan: Telefon)"/>
          <input id="l_city" placeholder="Shahar"/>
          <input id="l_contact" placeholder="Aloqa"/>
          <button id="btnLost" class="btn btn-red">E’lon berish</button>
        </div>
      </section>

      <!-- FOUND FORM -->
      <section id="view_foundForm" class="view">
        <div class="card">
          <h3>Topdim — e’lon</h3>
          <input id="f_item" placeholder="Narsa (masalan: Pasport)"/>
          <input id="f_city" placeholder="Shahar"/>
          <input id="f_contact" placeholder="Aloqa"/>
          <button id="btnFound" class="btn btn-green">E’lon berish</button>
        </div>
      </section>

      <!-- LISTS -->
      <section id="view_lostList" class="view"><div id="lost_list">—</div></section>
      <section id="view_foundList" class="view"><div id="found_list">—</div></section>

      <!-- PROFILE -->
      <section id="view_profile" class="view">
        <div class="card">
          <h3>Profil</h3>
          <img id="profileAvatar" style="width:80px;height:80px;border-radius:50%"/>
          <input id="profileName" placeholder="Ism"/>
          <input id="profileEmail" placeholder="Email" disabled/>
          <input id="profilePhone" placeholder="Telefon"/>
          <input id="profileCity" placeholder="Shahar"/>
          <textarea id="profileBio" placeholder="Bio"></textarea>
          <button id="btnSaveProfile" class="btn btn-green">💾 Saqlash</button>
        </div>
      </section>
    </div>
    <div class="footer">© <span id="year"></span> BINGO</div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script>
  // Firebase init
  const firebaseConfig={apiKey:"AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",authDomain:"topildi.firebaseapp.com",projectId:"topildi",storageBucket:"topildi.appspot.com",messagingSenderId:"323891530719",appId:"1:323891530719:web:d57c2ce38781dc37e4926a"};
  firebase.initializeApp(firebaseConfig);
  const db=firebase.firestore(); const auth=firebase.auth();

  // Router
  let currentView="home";
  function showView(v){document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"));document.getElementById("view_"+v).classList.add("active");currentView=v;}
  document.getElementById("homeBtn").onclick=()=>showView("home");
  document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>showView(b.dataset.nav));
  document.getElementById("year").textContent=new Date().getFullYear();

  // Gmail login
  const userBtn=document.getElementById("userBtn");
  userBtn.onclick=async()=>{
    if(auth.currentUser){await auth.signOut();alert("Chiqildi")}else{await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());alert("Kirilindi")}
  };
  auth.onAuthStateChanged(u=>{
    if(u){document.getElementById("profileName").value=u.displayName||"";document.getElementById("profileEmail").value=u.email||"";if(u.photoURL)document.getElementById("profileAvatar").src=u.photoURL;}
    else{document.getElementById("profileName").value="";document.getElementById("profileEmail").value="";document.getElementById("profileAvatar").src="";}
  });

  // Save profile
  document.getElementById("btnSaveProfile").onclick=async()=>{
    if(!auth.currentUser)return alert("Kirish shart");
    await db.collection("users").doc(auth.currentUser.uid).set({
      name:document.getElementById("profileName").value,
      email:auth.currentUser.email,
      phone:document.getElementById("profilePhone").value,
      city:document.getElementById("profileCity").value,
      bio:document.getElementById("profileBio").value
    },{merge:true});
    alert("Profil saqlandi");
  };

  // Post submit
  document.getElementById("btnLost").onclick=()=>{db.collection("posts").add({kind:"lost",item:l_item.value,city:l_city.value,contact:l_contact.value,uid:auth.currentUser?.uid||null,created:Date.now()})};
  document.getElementById("btnFound").onclick=()=>{db.collection("posts").add({kind:"found",item:f_item.value,city:f_city.value,contact:f_contact.value,uid:auth.currentUser?.uid||null,created:Date.now()})};

  // Render
  db.collection("posts").orderBy("created","desc").onSnapshot(s=>{
    lost_list.innerHTML=s.docs.filter(d=>d.data().kind==="lost").map(d=>"<div class='post-card'>❗ "+d.data().item+" — "+d.data().city+"</div>").join("");
    found_list.innerHTML=s.docs.filter(d=>d.data().kind==="found").map(d=>" <div class='post-card'>✅ "+d.data().item+" — "+d.data().city+"</div>").join("");
  });
  </script>
</body>
</html>
