<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>BINGO — Yo‘qoldi/Topildi</title>
<meta name="theme-color" content="#f59e0b"/>

<style>
  :root{
    --bg1:#FFF7D6; --bg2:#FFE59A;
    --panel:#0f172a; --ring:#e5e7eb33; --text:#0F172A;
    --muted:#475569; --text-card:#F1F5F9; --muted-card:#94A3B8;
    --blue:#1e293b; --green:#16A34A; --red:#DC2626; --amber:#f59e0b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Roboto}
  body{background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
  .wrap{max-width:980px;margin:0 auto;padding:16px 14px 28px}
  .topbar{position:sticky;top:0;z-index:70;background:linear-gradient(180deg,rgba(255,243,204,.92),rgba(255,236,173,.78));border-bottom:1px solid #f1d28a}
  .hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:#fff3c4;border:1px solid #f1d28a;font-weight:900;color:#b45309}
  .title{font-weight:800;letter-spacing:.2px;color:#1f2937}
  .controls{display:flex;gap:8px;align-items:center}
  select.lang{background:#fff3c4;color:#1f2937;border:1px solid #f1d28a;border-radius:10px;padding:8px 10px}

  .hero{margin:24px 0 12px}
  .headline{font-size:28px;line-height:1.3;font-weight:900;color:#111827}
  .muted{color:#475569;margin-top:6px}

  /* === Reklama === */
  .ad-box{
    margin:20px 0;border-radius:16px;overflow:hidden;
    background:#0f172a;color:#facc15;text-align:center;position:relative
  }
  .ad-title{
    font-weight:800;
    padding:8px;
    background:#0f172a;
    color:#facc15;
  }
  .ad-slider img{
    width:100%;
    height:auto;
    max-height:400px;
    object-fit:contain; /* rasm siqilmaydi */
    display:none;
    background:#000; /* agar bo‘sh joy qolsa qora fon */
  }
  .ad-slider img.active{display:block;animation:fadeIn 700ms}
  .ad-text{
    padding:12px;
    font-weight:800;
    font-size:18px;
    background:#facc15;
    color:#0f172a;
    animation:blink 1.5s infinite;
  }
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
  @media(max-width:520px){ .ad-slider img{max-height:250px} }

  .footer{text-align:left;color:#334155;margin-top:12px;font-size:14px}
</style>
</head>
<body>
  <div class="topbar">
    <div class="hdr">
      <div class="brand">
        <div class="logo">BG</div>
        <div class="title">BINGO</div>
      </div>
      <div class="controls">
        <select id="langSel" class="lang">
          <option value="uz">UZ</option>
          <option value="ru">RU</option>
          <option value="en">EN</option>
        </select>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- HOME -->
    <section id="view_home" class="view active">
      <div class="hero">
        <div class="headline">Yo‘qotdingizmi yoki topdingizmi? E’lon qoldiring.</div>
        <div class="muted">“Halollik — eng katta mukofot.”</div>
      </div>

      <!-- === Reklama joyi === -->
      <div class="ad-box">
        <div class="ad-title" id="adTitle">Reklama</div>
        <div class="ad-slider" id="adSlider">
          <img data-title="Reklama 1"
               src="./images/file_000000002de8624383c746f2d7d3cfd7.png?v=3"
               alt="Reklama 1">
          <img data-title="Reklama 2"
               src="./images/file_00000000538861fab34b2e1a449b4ce5.png?v=3"
               alt="Reklama 2">
        </div>
        <div class="ad-text" id="adBanner">★ Bu yerda sizning reklamangiz bo‘lishi mumkin edi</div>
      </div>
    </section>

    <div class="footer">© <span id="year"></span> BINGO</div>
  </div>

<script>
  // Yil
  document.getElementById('year').textContent=new Date().getFullYear();

  // Reklama slayder
  (function(){
    const box = document.querySelector('.ad-box');
    const titleEl = document.getElementById('adTitle');
    const imgs = Array.from(document.querySelectorAll('#adSlider img'));

    imgs.forEach(img=>{
      img.addEventListener('error', ()=>{ img.remove(); }, {once:true});
    });

    function start(){
      const slides = Array.from(document.querySelectorAll('#adSlider img'));
      if(!slides.length){ box.style.display='none'; return; }
      let i=0;
      function show(){
        slides.forEach((im,idx)=>im.classList.toggle('active', idx===i));
        titleEl.textContent = slides[i].dataset.title || 'Reklama';
        i=(i+1)%slides.length;
      }
      show();
      setInterval(show,4000);
    }
    setTimeout(start,300);
  })();
</script>
</body>
</html>
