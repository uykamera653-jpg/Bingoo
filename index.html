<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BINGO — Yo‘qotdim/Topdim</title>
  <meta name="theme-color" content="#f59e0b" />

  <!-- PWA manifest (sizning repoingizda allaqachon bor) -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.png" sizes="192x192" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    :root{
      --bg:#FFF7D6; --card:#fff; --ink:#1f2937; --muted:#6b7280;
      --brand:#f59e0b; --brand-ink:#1e293b; --ring:#eab308;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial}
    body{background:linear-gradient(180deg,#FFF7D6, #FFE59A);}
    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.7);backdrop-filter:saturate(180%) blur(6px);border-bottom:1px solid #f3f4f6}
    .hdr{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 4px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{width:40px;height:40px;display:grid;place-items:center;border-radius:10px;background:#f59e0b;color:#111;font-weight:800}
    .title{font-weight:800;font-size:18px;line-height:1.1}
    .title small{display:block;color:var(--muted);font-weight:600}
    .btn{appearance:none;border:0;border-radius:12px;padding:12px 16px;font-weight:700;background:var(--brand);color:#111;cursor:pointer}
    .btn:active{transform:translateY(1px)}
    .btn.secondary{background:#111;color:#fff}
    .btn.ghost{background:#fff3; border:1px solid #f59e0b55}
    .card{background:var(--card);border:1px solid #f3f4f6;border-radius:16px;box-shadow:0 4px 16px rgba(15,23,42,.06)}
    .form{display:grid;gap:12px;padding:16px}
    label{font-size:13px;color:var(--muted);font-weight:600}
    input,select,textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #e5e7eb;background:#fff;font-size:15px}
    textarea{min-height:110px;resize:vertical}
    .grid{display:grid;gap:12px}
    @media (min-width:720px){ .grid.cols-2{grid-template-columns:1fr 1fr} }
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .tabs{display:flex;gap:8px;flex-wrap:wrap}
    .chip{padding:8px 12px;border:1px solid #e5e7eb;border-radius:9999px;background:#fff;cursor:pointer;font-weight:600}
    .chip.active{background:#111;color:#fff;border-color:#111}
    .list{display:grid;gap:10px;padding:16px}
    .item{padding:14px;border:1px solid #eef;border-radius:14px;background:#fff}
    .item h4{margin:0 0 6px 0}
    .muted{color:var(--muted)}
    .footer{padding:24px 8px;color:var(--muted);text-align:center}
  </style>
</head>
<body>
  <div class="topbar">
    <div class="wrap hdr">
      <div class="brand">
        <div class="logo">BG</div>
        <div class="title">BINGO — Yo‘qotdim / Topdim <small>Tez e’lon, tez topilsa</small></div>
      </div>
      <div class="toolbar">
        <button id="copyLink" class="btn ghost">Havolani nusxa olish</button>
        <button id="switchSave" class="btn">Onlayn saqlash: Firestore</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- E'lon formasi -->
    <div class="card">
      <form id="form" class="form" autocomplete="off">
        <h3 style="margin:0">Yangi e’lon</h3>

        <div class="grid cols-2">
          <div>
            <label>Turi</label>
            <select id="turi" required>
              <option value="yoqotdim">Yo‘qotdim</option>
              <option value="topdim">Topdim</option>
            </select>
          </div>
          <div>
            <label>Shahar</label>
            <input id="shahar" placeholder="Toshkent, Samarqand..." required />
          </div>
        </div>

        <div>
          <label>Sarlavha</label>
          <input id="sarlavha" placeholder="Masalan: Qora hamyon yo‘qoldi" required />
        </div>

        <div>
          <label>Tavsif</label>
          <textarea id="tavsif" placeholder="Qayerda yo‘qoldi/topildi, belgilar va h.k." required></textarea>
        </div>

        <div class="grid cols-2">
          <div>
            <label>Telefon</label>
            <input id="telefon" placeholder="+998 ** *** ** **" required />
          </div>
          <div>
            <label>Mukofot (ixtiyoriy)</label>
            <input id="mukofot" type="text" placeholder="Masalan: 300 000 so‘m" />
          </div>
        </div>

        <div class="toolbar" style="justify-content:space-between">
          <button type="submit" class="btn" id="sendBtn">E’lonna joylash</button>
          <button type="button" class="btn secondary" id="resetBtn">Tozalash</button>
        </div>
      </form>
    </div>

    <!-- Filtrlar + ro‘yxat -->
    <div class="card" style="margin-top:14px">
      <div class="form" style="border-bottom:1px solid #f3f4f6">
        <div class="grid cols-2">
          <div>
            <label>Qidirish (sarlavha / shahar)</label>
            <input id="qidirish" placeholder="Matn kiriting..." />
          </div>
          <div style="display:flex;align-items:flex-end;gap:8px">
            <button id="refresh" class="btn secondary" type="button">Yangilash</button>
          </div>
        </div>
        <div class="tabs">
          <button class="chip active" data-tab="hammasi">Hammasi</button>
          <button class="chip" data-tab="yoqotdim">Yo‘qotdim</button>
          <button class="chip" data-tab="topdim">Topdim</button>
        </div>
      </div>
      <div class="list" id="list">
        <!-- E’lonlar shu yerda paydo bo‘ladi -->
      </div>
    </div>

    <div class="footer">© 2025 BINGO</div>
  </div>

  <!-- Firebase + App -->
  <script type="module">
    // Firebase SDK (modular)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
    import {
      getFirestore, collection, addDoc, serverTimestamp,
      query, orderBy, getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

    // === Siz bergan config ===
    const firebaseConfig = {
      apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
      authDomain: "topildi.firebaseapp.com",
      databaseURL: "https://topildi-default-rtdb.firebaseio.com",
      projectId: "topildi",
      storageBucket: "topildi.firebasestorage.app",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
      measurementId: "G-NKCMKCXZQ7"
    };

    // App’ni ishga tushirish
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const col = collection(db, "elonlar"); // Firestore kolleksiyasi

    // UI elementlar
    const form = document.getElementById('form');
    const sendBtn = document.getElementById('sendBtn');
    const resetBtn = document.getElementById('resetBtn');
    const listEl = document.getElementById('list');
    const qidirish = document.getElementById('qidirish');
    const tabs = document.querySelectorAll('.chip');
    const refreshBtn = document.getElementById('refresh');
    const switchSaveBtn = document.getElementById('switchSave');
    const copyLinkBtn = document.getElementById('copyLink');

    let currentTab = 'hammasi'; // hammasi | yoqotdim | topdim
    let cache = []; // sahifada ko‘rsatish uchun

    // Linkni nusxalash
    copyLinkBtn.addEventListener('click', async () => {
      try{
        await navigator.clipboard.writeText(location.href);
        copyLinkBtn.textContent = "Havola nusxalandi ✅";
        setTimeout(()=> copyLinkBtn.textContent = "Havolani nusxa olish", 1600);
      }catch(e){
        alert("Nusxalab bo‘lmadi. Qo‘lda nusxalang.");
      }
    });

    // “Onlayn saqlash” tugmasi (vizual, Firestore ishlatilmoqda)
    switchSaveBtn.addEventListener('click', ()=> {
      alert("Ma’lumotlar Cloud Firestore’da saqlanadi va barcha foydalanuvchilar ko‘ra oladi.");
    });

    // Forma yuborish
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      sendBtn.disabled = true; sendBtn.textContent = "Yuborilmoqda...";

      const payload = {
        turi: document.getElementById('turi').value,
        shahar: (document.getElementById('shahar').value||"").trim(),
        sarlavha: (document.getElementById('sarlavha').value||"").trim(),
        tavsif: (document.getElementById('tavsif').value||"").trim(),
        telefon: (document.getElementById('telefon').value||"").trim(),
        mukofot: (document.getElementById('mukofot').value||"").trim(),
        createdAt: serverTimestamp()
      };

      // Kichik tekshiruv
      if(!payload.shahar || !payload.sarlavha || !payload.tavsif || !payload.telefon){
        alert("Iltimos barcha majburiy maydonlarni to‘ldiring.");
        sendBtn.disabled = false; sendBtn.textContent = "E’lonna joylash";
        return;
      }

      try{
        await addDoc(col, payload);
        alert("E’lon joylandi ✅");
        form.reset();
        document.getElementById('turi').value = "yoqotdim";
        await loadList();  // yangilash
      }catch(err){
        console.error(err);
        alert("Saqlashda xatolik. Tarmoq yoki ruxsatlarni tekshiring.");
      }finally{
        sendBtn.disabled = false; sendBtn.textContent = "E’lonna joylash";
      }
    });

    resetBtn.addEventListener('click', ()=> form.reset());

    // Filtr tabs
    tabs.forEach(t => {
      t.addEventListener('click', () => {
        tabs.forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        currentTab = t.dataset.tab;
        render();
      });
    });

    // Qidirish
    qidirish.addEventListener('input', ()=> render());
    refreshBtn.addEventListener('click', ()=> loadList());

    // Firestore’dan o‘qib kelish
    async function loadList(){
      const q = query(col, orderBy('createdAt','desc'));
      const snap = await getDocs(q);
      cache = snap.docs.map(d => ({ id:d.id, ...d.data() }));
      render();
    }

    function render(){
      const term = (qidirish.value||"").toLowerCase().trim();
      const filtered = cache.filter(it=>{
        const byTab = currentTab==='hammasi' ? true : it.turi===currentTab;
        const byText = !term ? true :
          (it.sarlavha||'').toLowerCase().includes(term) ||
          (it.shahar||'').toLowerCase().includes(term) ||
          (it.tavsif||'').toLowerCase().includes(term);
        return byTab && byText;
      });

      if(filtered.length===0){
        listEl.innerHTML = `<div class="muted" style="padding:8px 0">Hozircha e’lon yo‘q.</div>`;
        return;
      }

      listEl.innerHTML = filtered.map(it=>`
        <div class="item">
          <h4>${escapeHtml(it.sarlavha||'')}</h4>
          <div class="muted" style="margin-bottom:6px">
            ${it.turi==='yoqotdim'?'Yo‘qotdim':'Topdim'} • ${escapeHtml(it.shahar||'-')}
          </div>
          <div style="white-space:pre-wrap">${escapeHtml(it.tavsif||'')}</div>
          <div class="muted" style="margin-top:8px">
            📞 ${escapeHtml(it.telefon||'-')}
            ${it.mukofot ? ` • 🎁 ${escapeHtml(it.mukofot)}` : ''}
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, m=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    }

    // Birinchi yuklash
    loadList();

    // PWA: service worker (agar root’da sw.js bo‘lsa)
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  </script>
</body>
  </html>
