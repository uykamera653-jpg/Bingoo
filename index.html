<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>BINGO — Yo‘qoldi/Topildi</title>
  <meta name="theme-color" content="#f59e0b"/>

  <style>
    :root{
      --bg1:#FFF7D6; --bg2:#FFE59A;
      --panel:#0f172a; --ring:#e5e7eb33; --text:#0F172A;
      --muted:#475569; --text-card:#F1F5F9; --muted-card:#94A3B8;
      --blue:#1e293b; --green:#16A34A; --red:#DC2626; --amber:#f59e0b;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:Inter,system-ui,Segoe UI,Roboto}
    body{background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--text)}
    .wrap{max-width:980px;margin:0 auto;padding:16px 14px 28px}
    .topbar{position:sticky;top:0;z-index:70;background:linear-gradient(180deg,rgba(255,243,204,.92),rgba(255,236,173,.78));border-bottom:1px solid #f1d28a}
    .hdr{display:flex;justify-content:space-between;align-items:center;padding:10px 14px}
    .brand{display:flex;align-items:center;gap:10px}
    .logo{width:36px;height:36px;border-radius:12px;display:grid;place-items:center;background:#fff3c4;border:1px solid #f1d28a;font-weight:900;color:#b45309}
    .title{font-weight:800;letter-spacing:.2px;color:#1f2937}
    .controls{display:flex;gap:8px;align-items:center}
    .iconbtn{display:grid;place-items:center;width:36px;height:36px;border-radius:10px;background:#fff3c4;border:1px solid #f1d28a;cursor:pointer;color:#1f2937}
    .hero{margin:24px 0 12px}
    .headline{font-size:34px;line-height:1.3;font-weight:900;color:#111827}
    .muted{color:#475569;margin-top:6px}
    .footer{text-align:center;color:#334155;margin-top:20px;font-size:13px}

    /* Reklama rotatori */
    .ad-rotor{
      position:relative; overflow:hidden; margin:14px 0;
      background:#0f172a; border:1px solid #223047;
      border-radius:16px; padding:8px;
      display:flex; justify-content:center; align-items:center;
      min-height:120px; flex-direction:column;
    }
    .ad-rotor img{
      width:100%; max-height:200px; object-fit:cover;
      border-radius:10px; display:block;
      opacity:0; position:absolute; left:0; top:0;
      transition:opacity .6s ease;
    }
    .ad-rotor img.show{opacity:1; position:relative;}

    /* 🔥 Animatsiyali reklam matni */
    .ad-text{
      margin-top:10px; text-align:center; font-weight:900;
      font-size:16px; letter-spacing:.3px;
      background:linear-gradient(90deg,#fef3c7,#facc15,#fde047,#facc15,#fef3c7);
      -webkit-background-clip:text; background-clip:text; color:transparent;
      animation: shine 2.8s linear infinite, blink 3s steps(2,start) infinite;
      user-select:none;
    }
    @keyframes shine{
      0%{background-position:-200% 0}
      100%{background-position:200% 0}
    }
    @keyframes blink{
      0%,100%{filter:drop-shadow(0 0 0 rgba(0,0,0,0)); opacity:1}
      50%{opacity:.65}
    }

    @media (max-width:520px){
      .ad-rotor img{max-height:140px}
      .ad-text{font-size:14px}
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="hdr">
      <div class="brand">
        <div class="logo">BG</div>
        <div class="title">BINGO</div>
      </div>
      <div class="controls">
        <button id="homeBtn" class="iconbtn" title="Bosh sahifa">⌂</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- HOME (faqat shu sahifada reklama bor) -->
    <section id="view_home" class="view active">
      <div class="hero">
        <div class="headline">Yo‘qotdingizmi yoki topdingizmi? E’lon qoldiring.</div>
        <div class="muted">“Halollik — eng katta mukofot.”</div>
      </div>

      <!-- Reklama Banner Rotatori -->
      <div class="ad-rotor" id="adRotor">
        <a id="adLink" href="#" target="_blank" rel="noopener">
          <img id="adImg1" alt="ad1">
          <img id="adImg2" alt="ad2">
        </a>
        <div class="ad-text">★ Bu yerda sizning reklamangiz bo‘lishi mumkin</div>
      </div>
    </section>

    <div class="footer">© <span id="year"></span> BINGO</div>
  </div>

  <script>
    document.getElementById('year').textContent=new Date().getFullYear();

    // Reklama rasmlari (siz yuklagan fayllar)
    const AD_ITEMS = [
      {
        img: "https://uykamera653-jpg.github.io/Bingoo/images/20250901_154133.jpg",
        url: "https://example.com/reklama1"
      },
      {
        img: "https://uykamera653-jpg.github.io/Bingoo/images/20250901_180526.jpg",
        url: "https://example.com/reklama2"
      }
    ];

    // Banner rotator (5 soniyada almashadi)
    (function initRotor(){
      const box = document.getElementById('adRotor');
      if(!box || !AD_ITEMS.length) return;

      const link = document.getElementById('adLink');
      const img1 = document.getElementById('adImg1');
      const img2 = document.getElementById('adImg2');

      // oldindan yuklab olish (lag bo'lmasin)
      AD_ITEMS.forEach(a=>{ const i=new Image(); i.src=a.img; });

      let idx = 0, useFirst = true;
      function show(i){
        const item = AD_ITEMS[i % AD_ITEMS.length];
        (useFirst ? img1 : img2).src = item.img;
        link.href = item.url || '#';

        if(useFirst){
          img1.classList.add('show'); img2.classList.remove('show');
        }else{
          img2.classList.add('show'); img1.classList.remove('show');
        }
        useFirst = !useFirst;
      }

      img1.classList.add('show');
      show(0);
      setInterval(()=>{ idx=(idx+1)%AD_ITEMS.length; show(idx); }, 5000);
    })();
  </script>
</body>
</html>
