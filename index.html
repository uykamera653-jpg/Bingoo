<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>BINGO — Yo‘qotdim/Topdim</title>
  <meta name="theme-color" content="#f59e0b"/>

  <!-- PWA manifest (sizda allaqachon bor) -->
  <link rel="manifest" href="manifest.webmanifest"/>

  <style>
    :root{
      --bg:#FFF7D6; --panel:#0f172a; --brand:#f59e0b; --ink:#0f172a;
      --muted:#475569; --card:#fff; --ring:#e5e7eb;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
    body{background:linear-gradient(180deg,#FFF7D6 0%, #FFE59A 100%); color:var(--ink)}
    .wrap{max-width:980px; margin:0 auto; padding:16px}
    .topbar{position:sticky; top:0; z-index:20; background:transparent; padding:8px 0}
    .hdr{display:flex; align-items:center; justify-content:space-between}
    .brand{display:flex; align-items:center; gap:10px}
    .logo{width:40px; height:40px; border-radius:10px; background:#000; display:grid; place-items:center; font-weight:800; color:#fff}
    .title{font-weight:800; font-size:20px; letter-spacing:.3px}
    .card{background:var(--card); border:1px solid var(--ring); border-radius:16px; padding:16px; box-shadow:0 6px 20px rgba(0,0,0,.04)}
    .grid{display:grid; gap:16px}
    @media(min-width:860px){ .grid-2{grid-template-columns:460px 1fr} }
    label{font-size:13px; color:var(--muted); margin-bottom:6px; display:block}
    input,select,textarea{
      width:100%; padding:12px 14px; border:1px solid var(--ring); border-radius:12px;
      background:#fff; font-size:15px; outline:none;
    }
    textarea{min-height:90px; resize:vertical}
    .row{display:grid; grid-template-columns:1fr 1fr; gap:12px}
    .btn{appearance:none; border:0; border-radius:12px; padding:12px 16px; font-weight:700; cursor:pointer}
    .btn-primary{background:var(--brand); color:#1f2937}
    .btn-ghost{background:transparent; border:1px solid var(--ring)}
    .toolbar{display:flex; gap:8px; align-items:center; flex-wrap:wrap}
    .tag{padding:6px 10px; border-radius:999px; border:1px solid var(--ring); background:#fff; font-size:12px; cursor:pointer}
    .tag.active{background:#FEF3C7; border-color:#FCD34D}
    .list{display:grid; gap:12px}
    .item{background:#fff; border:1px solid var(--ring); border-radius:14px; padding:12px}
    .item h4{margin:0 0 6px 0}
    .muted{color:var(--muted); font-size:13px}
    .footer{margin:24px 0 40px; text-align:center; color:var(--muted); font-size:12px}
    .pill{background:#111827; color:#FDE68A; padding:4px 8px; border-radius:999px; font-size:12px; font-weight:700}
    .success{color:#16a34a;font-weight:700}
    .danger{color:#dc2626;font-weight:700}
    .search{display:flex; gap:8px}
    .search input{flex:1}
  </style>

  <!-- Firebase (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="hdr">
        <div class="brand">
          <div class="logo">BG</div>
          <div class="title">BINGO — Yo‘qotdim / Topdim</div>
        </div>
        <div class="toolbar">
          <button class="tag" id="copyLinkBtn">Havolani nusxa olish</button>
          <span class="pill">Onlayn saqlash: Firestore</span>
        </div>
      </div>
    </div>

    <div class="grid grid-2">
      <!-- Form -->
      <div class="card">
        <h3 style="margin:0 0 12px 0">Yangi e’lon</h3>
        <div class="row">
          <div>
            <label>Turi</label>
            <select id="tur">
              <option value="yoqotdim">Yo‘qotdim</option>
              <option value="topdim">Topdim</option>
            </select>
          </div>
          <div>
            <label>Shahar</label>
            <input id="shahar" placeholder="Toshkent, Samarqand..."/>
          </div>
        </div>

        <label style="margin-top:12px">Sarlavha</label>
        <input id="sarlavha" placeholder="Masalan: Qora hamyon yo‘qolgan"/>

        <label style="margin-top:12px">Tavsif</label>
        <textarea id="tavsif" placeholder="Qayerda yo‘qoldi/topildi, belgilari va h.k."></textarea>

        <div class="row" style="margin-top:12px">
          <div>
            <label>Telefon</label>
            <input id="telefon" placeholder="+998 ** *** ** **"/>
          </div>
          <div>
            <label>Mukofot (ixtiyoriy)</label>
            <input id="mukofot" placeholder="150 000 so‘m"/>
          </div>
        </div>

        <div class="toolbar" style="margin-top:14px">
          <button class="btn btn-primary" id="submitBtn">E’lonni joylash</button>
          <button class="btn btn-ghost" id="clearBtn">Tozalash</button>
          <span id="status"></span>
        </div>
      </div>

      <!-- List -->
      <div class="card">
        <div class="toolbar" style="justify-content:space-between">
          <h3 style="margin:0">E’lonlar</h3>
          <div class="search">
            <input id="qidir" placeholder="Qidirish (sarlavha / shahar)"/>
            <button class="btn btn-ghost" id="refreshBtn">Yangilash</button>
          </div>
        </div>
        <div class="toolbar" style="margin:10px 0">
          <span class="tag active" data-filter="hammasi">Hammasi</span>
          <span class="tag" data-filter="yoqotdim">Yo‘qotdim</span>
          <span class="tag" data-filter="topdim">Topdim</span>
        </div>
        <div id="list" class="list"></div>
      </div>
    </div>

    <div class="footer">© 2025 BINGO</div>
  </div>

<script>
/* =================== Firebase config =================== */
const firebaseConfig = {
  apiKey: "AIzaSyDw3_0AXL8J2N4dz1my_1XBuw1eV08x31o",
  authDomain: "topildi.firebaseapp.com",
  projectId: "topildi",
  storageBucket: "topildi.appspot.com",
  messagingSenderId: "323891530719",
  appId: "1:323891530719:web:d57c2ce38781dc37e4926a"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* =================== UI helpers =================== */
const $ = (id)=>document.getElementById(id);
const stat = (msg, ok=true)=>{
  $("status").innerHTML = ok ? `<span class="success">${msg}</span>` :
                               `<span class="danger">${msg}</span>`;
  setTimeout(()=> $("status").innerHTML="", 2500);
};
// localStorage bilan telefon/shaharni eslab qolish
["telefon","shahar"].forEach(k=>{
  const v = localStorage.getItem("bingo_"+k);
  if(v) $(k).value = v;
  $(k).addEventListener("change", ()=>localStorage.setItem("bingo_"+k, $(k).value.trim()));
});

/* =================== Add document =================== */
$("submitBtn").addEventListener("click", async ()=>{
  const elon = {
    tur: $("tur").value,
    sarlavha: $("sarlavha").value.trim(),
    tavsif: $("tavsif").value.trim(),
    telefon: $("telefon").value.trim(),
    shahar: $("shahar").value.trim(),
    mukofot: $("mukofot").value.trim(),
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };
  if(!elon.sarlavha || !elon.telefon){
    stat("Sarlavha va telefon shart!", false); return;
  }
  try{
    await db.collection("Elonlar").add(elon);
    stat("E’lon saqlandi ✅");
    $("sarlavha").value=""; $("tavsif").value=""; $("mukofot").value="";
    // ro‘yxat serverTimestamp bilan yozilgach, real-time listener o‘zi yangilanadi
  }catch(e){
    console.error(e); stat("Xatolik: saqlanmadi", false);
  }
});

/* =================== Real-time listener =================== */
let unsubscribe = null;
let currentFilter = "hammasi";
let cachedDocs = [];

function attachListener(){
  if(unsubscribe) unsubscribe();
  unsubscribe = db.collection("Elonlar")
    .orderBy("createdAt","desc")
    .limit(50)
    .onSnapshot(snap=>{
      cachedDocs = [];
      snap.forEach(d=>{
        const data = d.data();
        cachedDocs.push({id:d.id, ...data});
      });
      renderList();
    }, err=>{ console.error(err); stat("Ulanishda xatolik", false); });
}
attachListener();

/* =================== Render & filter/search =================== */
function renderList(){
  const q = $("qidir").value.trim().toLowerCase();
  const filtered = cachedDocs.filter(x=>{
    const fitType = (currentFilter==="hammasi") || (x.tur===currentFilter);
    const fitQ = !q || ( (x.sarlavha||"").toLowerCase().includes(q) || (x.shahar||"").toLowerCase().includes(q) );
    return fitType && fitQ;
  });

  $("list").innerHTML = filtered.length ? filtered.map(x=>{
    const when = x.createdAt?.toDate ? x.createdAt.toDate() : new Date();
    const date = when.toLocaleString();
    return `
      <div class="item">
        <h4>${x.sarlavha??""}</h4>
        <div class="muted">${x.tur==="yoqotdim"?"❗️ Yo‘qotdim":"✅ Topdim"} • ${x.shahar??"-"} • ${date}</div>
        <p style="margin:8px 0 10px">${(x.tavsif||"").replace(/\n/g,"<br/>")}</p>
        <div class="toolbar">
          <span class="tag">☎ ${x.telefon??""}</span>
          ${x.mukofot?`<span class="tag">🎁 ${x.mukofot}</span>`:""}
          <button class="btn btn-ghost" onclick="copyText('${(x.telefon||"").replace(/'/g,"&#39;")}')">Telefonni nusxa olish</button>
        </div>
      </div>
    `;
  }).join("") : `<div class="muted">Hozircha e’lon yo‘q.</div>`;
}

$("qidir").addEventListener("input", renderList);
$("refreshBtn").addEventListener("click", renderList);

// Filter tugmalari
document.querySelectorAll('.tag[data-filter]').forEach(el=>{
  el.addEventListener('click', ()=>{
    document.querySelectorAll('.tag[data-filter]').forEach(t=>t.classList.remove('active'));
    el.classList.add('active');
    currentFilter = el.dataset.filter;
    renderList();
  });
});

// Havola va matn nusxa olish
function copyText(t){
  navigator.clipboard.writeText(t).then(()=>stat("Nusxa olindi ✅"), ()=>stat("Nusxa olinmadi", false));
}
$("copyLinkBtn").addEventListener("click", ()=>{
  navigator.clipboard.writeText(location.href).then(()=>stat("Sayt havolasi nusxalandi ✅"), ()=>stat("Nusxa olinmadi", false));
});

// Tozalash
$("clearBtn").addEventListener("click", ()=>{
  ["sarlavha","tavsif","mukofot"].forEach(id=>$(id).value="");
  stat("Tozalandi");
});
</script>
</body>
</html>
