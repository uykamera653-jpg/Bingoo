<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BINGO — Yo‘qoldi/Topildi</title>
  
  <!-- Base yo‘l -->
  <base href="/Bingoo/">

  <!-- CSS -->
  <link rel="stylesheet" href="../css/base.css">
</head>
<body>
  <header>
    <h1>Yo‘qoldi / Topildi platforma</h1>
    <nav>
      <a href="../lost/index.html">❗ Yo‘qotdim</a>
      <a href="../topilganlar/index.html">✅ Topdim</a>
      <a href="../mukofotli/index.html">🎁 Mukofotli</a>
      <a href="../reklama/index.html">📌 Reklama</a>
      <a href="../elonlarim/index.html">⭐ Mening e’lonlarim</a>
      <a href="../profil/index.html">👤 Profil</a>
    </nav>
  </header>

  <main>
    <!-- Reklama slayder -->
    <section class="ads">
      <div class="slider">
        <img src="../images/file_000000002de8624383c746f2d7d3cfd7.png" alt="Reklama 1">
        <img src="../images/file_00000000538861fab34b2e1a449b4ce5.png" alt="Reklama 2">
      </div>
      <p class="marquee">⭐ Bu yerda sizning reklamangiz bo‘lishi mumkin ⭐</p>
    </section>

    <!-- Asosiy bo‘lim -->
    <section class="intro">
      <h2>Bosh sahifa</h2>
      <p>Barcha e’lonlarni shu yerdan boshqarishingiz mumkin.</p>
    </section>
  </main>

  <footer>
    <p>© 2025 BINGO</p>
  </footer>

  <!-- JS -->
  <script>
    // Reklama slayder kodlari
    const images = document.querySelectorAll('.slider img');
    let index = 0;
    setInterval(() => {
      images.forEach((img, i) => {
        img.style.display = (i === index) ? 'block' : 'none';
      });
      index = (index + 1) % images.length;
    }, 3000);
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #fff7d6;
      color: #0f172a;
    }
    header {
      background: #f59e0b;
      padding: 15px;
      text-align: center;
    }
    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #0f172a;
      font-weight: bold;
    }
    .ads {
      text-align: center;
      margin: 20px 0;
    }
    .slider {
      position: relative;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .slider img {
      width: 100%;
      display: none;
      border-radius: 8px;
    }
    .slider img:first-child {
      display: block;
    }
    .marquee {
      margin-top: 10px;
      font-weight: bold;
      color: #f59e0b;
      animation: marquee 10s linear infinite;
    }
    @keyframes marquee {
      0% {transform: translateX(100%);}
      100% {transform: translateX(-100%);}
    }
    footer {
      background: #0f172a;
      color: #fff;
      text-align: center;
      padding: 10px;
      margin-top: 20px;
    }
  </style>
</body>
</html>
