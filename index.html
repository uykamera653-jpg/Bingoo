<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BINGO – Yo‘qoldi / Topildi</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff8e1;
      color: #222;
    }
    header {
      background: #ffa000;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      padding: 15px;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    .btn-google {
      background: #fff;
      border: 1px solid #ccc;
      color: #444;
    }
    .btn-logout {
      background: #e53935;
      color: white;
    }
    .profile {
      margin: 15px 0;
      padding: 12px;
      border-radius: 8px;
      background: #fff3cd;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>BINGO – Yo‘qoldi / Topildi</header>

  <div class="container">
    <h2>Yo‘qotdingizmi yoki topdingizmi? E’lon qoldiring.</h2>
    <p><em>"Halollik – eng katta mukofot."</em></p>

    <!-- Google login -->
    <button id="googleLogin" class="btn btn-google">Google bilan kirish</button>
    <!-- Logout -->
    <button id="logout" class="btn btn-logout" style="display:none;">Chiqish</button>

    <!-- User profile info -->
    <div id="profile" class="profile" style="display:none;"></div>

    <!-- Announcement form -->
    <div id="announcementForm" style="display:none;">
      <h3>E’lon qo‘shish</h3>
      <input type="text" id="title" placeholder="Nima yo‘qolgan?" style="width:100%;padding:8px;margin:5px 0;">
      <input type="text" id="reward" placeholder="Topganga mukofot" style="width:100%;padding:8px;margin:5px 0;">
      <textarea id="desc" placeholder="Qo‘shimcha ma’lumot" style="width:100%;padding:8px;margin:5px 0;"></textarea>
      <button id="postAd" class="btn" style="background:#43a047;color:white;">E’lonni joylash</button>
    </div>

    <!-- Announcements list -->
    <div id="adsList">
      <h3>Oxirgi e’lonlar</h3>
      <div id="ads"></div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>

  <script>
    // ✅ Faqat yangi config – Topildi loyihasi
    const firebaseConfig = {
      apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
      authDomain: "topildi.firebaseapp.com",
      databaseURL: "https://topildi-default-rtdb.firebaseio.com",
      projectId: "topildi",
      storageBucket: "topildi.firebasestorage.app",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
      measurementId: "G-NKCMKCXZQ7"
    };

    // Init
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Elements
    const loginBtn = document.getElementById("googleLogin");
    const logoutBtn = document.getElementById("logout");
    const profileDiv = document.getElementById("profile");
    const formDiv = document.getElementById("announcementForm");
    const adsDiv = document.getElementById("ads");

    // Google login
    loginBtn.onclick = async () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      try {
        await auth.signInWithPopup(provider);
      } catch (err) {
        alert("Kirishda xato: " + err.message);
      }
    };

    // Logout
    logoutBtn.onclick = () => auth.signOut();

    // Auth state
    auth.onAuthStateChanged(user => {
      if (user) {
        loginBtn.style.display = "none";
        logoutBtn.style.display = "block";
        profileDiv.style.display = "block";
        formDiv.style.display = "block";
        profileDiv.innerHTML = `
          <b>👤 ${user.displayName}</b><br>
          ${user.email}
        `;
      } else {
        loginBtn.style.display = "block";
        logoutBtn.style.display = "none";
        profileDiv.style.display = "none";
        formDiv.style.display = "none";
      }
    });

    // E’lon qo‘shish
    document.getElementById("postAd").onclick = async () => {
      const user = auth.currentUser;
      if (!user) return alert("Avval tizimga kiring!");
      const title = document.getElementById("title").value;
      const reward = document.getElementById("reward").value;
      const desc = document.getElementById("desc").value;
      if (!title) return alert("Sarlavha kerak!");

      await db.collection("ads").add({
        title, reward, desc,
        author: user.displayName,
        email: user.email,
        created: new Date()
      });

      document.getElementById("title").value = "";
      document.getElementById("reward").value = "";
      document.getElementById("desc").value = "";
      alert("E’lon joylandi!");
    };

    // E’lonlarni ko‘rsatish
    db.collection("ads").orderBy("created", "desc").onSnapshot(snap => {
      adsDiv.innerHTML = "";
      snap.forEach(doc => {
        const ad = doc.data();
        adsDiv.innerHTML += `
          <div style="border:1px solid #ddd;padding:10px;margin:5px;border-radius:6px;background:#fff;">
            <b>${ad.title}</b><br>
            Mukofot: ${ad.reward || "-"}<br>
            ${ad.desc || ""}<br>
            <small>By: ${ad.author}</small>
          </div>
        `;
      });
    });
  </script>
</body>
</html>
