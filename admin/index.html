<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    body { font-family: sans-serif; background:#fff; color:#222; margin:20px; }
    h1 { color:#d00; }
    .ad { border:1px solid #ccc; padding:10px; margin:10px 0; border-radius:8px; }
    button { background:#d00; color:#fff; border:none; padding:6px 12px; border-radius:4px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>📋 Admin Panel</h1>
  <p>Bu yerda barcha e’lonlarni ko‘rib, keraklisini o‘chirishingiz mumkin.</p>

  <div id="ads"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔑 Sizning Firebase configingiz
    const firebaseConfig = {
      apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
      authDomain: "topildi.firebaseapp.com",
      projectId: "topildi",
      storageBucket: "topildi.firebasestorage.app",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const ADMIN_EMAIL = "diyorabduraxmonov95@gmail.com";
    const adsDiv = document.getElementById("ads");

    onAuthStateChanged(auth, async (user) => {
      if (!user || user.email !== ADMIN_EMAIL) {
        document.body.innerHTML = "<h2>⛔ Sizga ruxsat yo‘q</h2>";
        return;
      }

      // 🔥 E’lonlarni yuklash
      const querySnap = await getDocs(collection(db, "Elonlar"));
      querySnap.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "ad";
        div.innerHTML = `
          <strong>${data.sarlavha || "Sarlavhasiz"}</strong><br>
          <em>${data.shahar || ""}</em><br>
          <button onclick="deleteAd('${docSnap.id}')">🗑 O‘chirish</button>
        `;
        adsDiv.appendChild(div);
      });
    });

    // 🔥 E’lon o‘chirish
    window.deleteAd = async (id) => {
      await deleteDoc(doc(db, "Elonlar", id));
      alert("E’lon o‘chirildi!");
      location.reload();
    };
  </script>
</body>
</html>
