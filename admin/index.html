<!doctype html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BINGO • Admin panel</title>
  <meta name="color-scheme" content="light only">
  <link rel="icon" href="../icon.png">
  <style>
    /* ===========================
       BINGO ADMIN — OQ TEMA
       =========================== */

    :root{
      --bg: #ffffff;
      --paper:#f8fafc;
      --ink:#0b1220;
      --muted:#687385;
      --brand:#0ea5e9;        /* ko'k */
      --brand-ink:#0b3b5f;
      --ok:#10b981;           /* yashil */
      --warn:#f59e0b;         /* sariq */
      --danger:#ef4444;       /* qizil */
      --chip:#eef2f7;
      --ring: 0 0 0 3px rgba(14,165,233,.25);
      --radius:16px;
      --radius-sm:10px;
      --shadow: 0 10px 30px rgba(2,6,23,.08);
      --shadow-sm: 0 6px 18px rgba(2,6,23,.06);
      --mono: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      --sans: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Helvetica Neue,Arial,"Noto Sans",sans-serif;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font: 16px/1.55 var(--sans);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* Layout */
    .app{
      min-height:100%;
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:24px;
    }
    header{
      position:sticky; top:0; z-index:50;
      background:linear-gradient(180deg,#fff,rgba(255,255,255,.9));
      backdrop-filter:saturate(140%) blur(6px);
      border-bottom:1px solid #eef2f7;
    }
    .bar{
      max-width:1100px; margin:auto;
      padding:14px 18px; display:flex; gap:14px; align-items:center;
    }
    .logo{
      font-weight:800; letter-spacing:.4px;
      display:flex; align-items:center; gap:10px;
      color:var(--brand-ink)
    }
    .logo .dot{width:10px; height:10px; border-radius:999px; background:var(--brand)}
    .sp{flex:1}

    .paper{
      max-width:1100px; margin:0 auto 40px;
      padding:24px; background:var(--paper); border:1px solid #eef2f7;
      border-radius:var(--radius); box-shadow:var(--shadow);
    }
    .toolbar{display:flex; flex-wrap:wrap; gap:12px; align-items:center}
    .toolbar .group{display:flex; gap:10px; align-items:center; flex-wrap:wrap}
    .kpi{display:flex; gap:10px; flex-wrap:wrap; margin-top:16px}
    .kpi .card{
      background:#fff; border:1px solid #eef2f7; box-shadow:var(--shadow-sm);
      padding:14px 16px; border-radius:var(--radius-sm); min-width:160px;
    }
    .kpi .v{font-weight:800; font-size:20px}
    .muted{color:var(--muted)}

    /* Controls */
    .btn{
      appearance:none; border:1px solid #dbe2ea;
      background:#fff; color:var(--ink);
      padding:10px 14px; border-radius:12px; font-weight:600;
      cursor:pointer; transition:.15s transform, .15s box-shadow, .15s background;
      display:inline-flex; align-items:center; gap:10px;
    }
    .btn:focus-visible{outline:none; box-shadow:var(--ring)}
    .btn:hover{transform:translateY(-1px); box-shadow:var(--shadow-sm)}
    .btn.primary{background:var(--brand); color:#fff; border-color:transparent}
    .btn.green{background:var(--ok); color:#fff; border-color:transparent}
    .btn.red{background:var(--danger); color:#fff; border-color:transparent}
    .btn.ghost{background:transparent}
    .chip{
      background:var(--chip); color:var(--brand-ink); border-radius:999px;
      font: 12px/1 var(--sans); padding:6px 10px; border:1px solid #e5ebf2;
    }

    .select, .input{
      background:#fff; border:1px solid #dbe2ea; border-radius:12px;
      padding:10px 12px; min-width:180px; font-weight:600; color:var(--ink);
    }
    .input{min-width:280px}

    /* List */
    .list{
      margin-top:18px; display:grid; gap:14px;
    }
    .row{
      background:#fff; border:1px solid #eef2f7; border-radius:14px; padding:14px;
      display:grid; gap:12px; box-shadow:var(--shadow-sm);
    }
    .rowHead{display:flex; gap:12px; align-items:center}
    .tag{
      font-size:12px; padding:6px 10px; border-radius:999px; font-weight:800; letter-spacing:.3px;
      border:1px solid #e5ebf2; background:var(--chip)
    }
    .tag.lost{background:#fff1f2; border-color:#ffe4e6; color:#b91c1c}
    .tag.found{background:#ecfdf5; border-color:#d1fae5; color:#065f46}
    .tag.reward{background:#fff7ed; border-color:#ffedd5; color:#a16207}
    .rowBody{display:grid; gap:6px}
    .title{font-size:18px; font-weight:800}
    .meta{font:12px/1.4 var(--sans); color:var(--muted)}
    .wrap{display:flex; gap:10px; flex-wrap:wrap}
    .tools{display:flex; gap:8px; flex-wrap:wrap}
    .tools .btn{padding:8px 10px; border-radius:10px}

    .empty{
      text-align:center; padding:48px 16px; color:var(--muted)
    }

    /* Footer */
    footer{
      border-top:1px solid #eef2f7; background:#fff;
    }
    .foot{
      max-width:1100px; margin:auto; padding:18px; color:var(--muted); font-size:14px;
      display:flex; align-items:center; gap:10px; justify-content:space-between;
    }

    /* Dialog (confirm) */
    dialog{
      border:none; border-radius:16px; padding:0; overflow:hidden; width:min(520px, 92vw);
      box-shadow: 0 30px 80px rgba(2,6,23,.25);
    }
    .dlgHead{padding:18px 20px; background:var(--paper); border-bottom:1px solid #eaeef4; font-weight:800}
    .dlgBody{padding:18px 20px}
    .dlgFoot{padding:14px 20px; background:#fff; border-top:1px solid #eaeef4; display:flex; gap:10px; justify-content:flex-end}

    /* Utilities */
    .hide{display:none !important}
    .grid2{display:grid; grid-template-columns:1fr auto; gap:10px}
    .mono{font-family:var(--mono)}
    .truncate{
      max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }

    @media (max-width:720px){
      .bar{padding:12px}
      .paper{padding:16px}
      .input{min-width:unset; width:100%}
      .select{min-width:unset}
      .toolbar{flex-direction:column; align-items:stretch}
      .grid2{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div class="app" id="app">

  <!-- ================= HEADER ================= -->
  <header>
    <div class="bar">
      <div class="logo">
        <span class="dot"></span> BINGO
        <span class="chip">Admin</span>
      </div>
      <div class="sp"></div>
      <button id="btnSign" class="btn primary">Google orqali kirish</button>
      <div id="meBox" class="hide wrap">
        <span id="meName" class="chip"></span>
        <span id="meEmail" class="chip"></span>
        <button id="btnOut" class="btn ghost">Chiqish</button>
      </div>
    </div>
  </header>

  <!-- ================= MAIN ================= -->
  <main class="paper">
    <div class="toolbar">
      <div class="group">
        <button id="btnReload" class="btn">
          <span>↻</span> Yangilash
        </button>

        <select id="filterType" class="select" title="Tur bo‘yicha filtrlash">
          <option value="all">Hammasi</option>
          <option value="lost">Yo‘qotdim</option>
          <option value="found">Topdim</option>
          <option value="reward">Mukofotli</option>
        </select>

        <select id="filterCity" class="select" title="Shahar bo‘yicha filtrlash">
          <option value="all">Barcha shaharlar</option>
        </select>

        <select id="limitSel" class="select" title="Nechta ko‘rsatilsin">
          <option value="50">50 ta</option>
          <option value="100" selected>100 ta</option>
          <option value="200">200 ta</option>
        </select>
      </div>

      <div class="sp"></div>

      <div class="group grid2" style="min-width:280px">
        <input id="searchBox" class="input" type="search" placeholder="Qidirish: sarlavha, matn, shahar, uid, email">
        <button id="btnClear" class="btn ghost">Tozalash</button>
      </div>
    </div>

    <div class="kpi">
      <div class="card"><div class="muted">Jami e’lon</div><div id="kTotal" class="v">0</div></div>
      <div class="card"><div class="muted">Yo‘qotdim</div><div id="kLost" class="v">0</div></div>
      <div class="card"><div class="muted">Topdim</div><div id="kFound" class="v">0</div></div>
      <div class="card"><div class="muted">Mukofotli</div><div id="kReward" class="v">0</div></div>
    </div>

    <div id="list" class="list">
      <div class="empty">Ma’lumot yuklanmoqda…</div>
    </div>
  </main>

  <!-- ================= FOOTER ================= -->
  <footer>
    <div class="foot">
      <div>© <span id="year"></span> BINGO • Admin panel</div>
      <div class="muted">Real-time Firestore bilan ishlaydi</div>
    </div>
  </footer>
</div>

<!-- ================= CONFIRM DIALOG ================= -->
<dialog id="confirmDlg">
  <div class="dlgHead">E’lonni o‘chirish</div>
  <div class="dlgBody">
    <p style="margin:0 0 8px">Quyidagi e’lonni o‘chirmoqchimisiz?</p>
    <div id="confirmInfo" class="mono" style="font-size:12px;background:#f8fafc;border:1px solid #eef2f7;padding:10px;border-radius:10px"></div>
    <p class="muted" style="margin:10px 0 0">Bu amalni qaytarib bo‘lmaydi.</p>
  </div>
  <div class="dlgFoot">
    <button id="noBtn" class="btn">Bekor qilish</button>
    <button id="yesBtn" class="btn red">Ha, o‘chir</button>
  </div>
</dialog>

<!-- ================= SCRIPTS ================= -->
<script type="module">
  /* =========================================================
     BINGO ADMIN PANEL — FIREBASE v10 (Modular SDK)
     ========================================================= */

  // ---------- Firebase SDK’lar
  import {
    initializeApp
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js";
  import {
    getFirestore, collection, doc, getDoc, getDocs, onSnapshot,
    query, orderBy, limit, where, deleteDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

  // ---------- Config (SENI CONFIGING — ishlataver)
  const firebaseConfig = {
    apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
    authDomain: "topildi.firebaseapp.com",
    databaseURL: "https://topildi-default-rtdb.firebaseio.com",
    projectId: "topildi",
    storageBucket: "topildi.firebasestorage.app",
    messagingSenderId: "323891530719",
    appId: "1:323891530719:web:d57c2ce38781dc37e4926a",
    measurementId: "G-NKCMKCXZQ7"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  // ---------- DOM shorthands
  const $  = sel => document.querySelector(sel);
  const $$ = sel => Array.from(document.querySelectorAll(sel));
  const ui = {
    btnSign: $('#btnSign'),
    btnOut:  $('#btnOut'),
    meBox:   $('#meBox'),
    meName:  $('#meName'),
    meEmail: $('#meEmail'),
    btnReload: $('#btnReload'),
    filterType: $('#filterType'),
    filterCity: $('#filterCity'),
    searchBox: $('#searchBox'),
    btnClear: $('#btnClear'),
    limitSel: $('#limitSel'),
    list: $('#list'),
    kTotal: $('#kTotal'),
    kLost: $('#kLost'),
    kFound: $('#kFound'),
    kReward: $('#kReward')
  };

  // ---------- Admin ruxsat siyosati
  const ADMIN_WHITELIST = new Set([
    "diyorabduraxmonov95@gmail.com" // bu email avtomatik admin
    // hojati bo'lsa, qo'sha ber: "foo@bar.com"
  ]);

  async function isAdminUser(user) {
    if (!user) return false;
    if (ADMIN_WHITELIST.has(user.email)) return true;
    try {
      const d = await getDoc(doc(db, 'rules', user.uid));
      return d.exists() && d.data().admin === true;
    } catch(e){ console.warn('rules tekshiruv xato', e); return false; }
  }

  // ---------- Auth UI
  const provider = new GoogleAuthProvider();

  ui.btnSign.addEventListener('click', async () => {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      alert("Kirishda xatolik: " + e.message);
    }
  });

  ui.btnOut.addEventListener('click', () => signOut(auth));

  onAuthStateChanged(auth, async user => {
    if (!user) {
      ui.btnSign.classList.remove('hide');
      ui.meBox.classList.add('hide');
      ui.list.innerHTML = `<div class="empty">Admin paneldan foydalanish uchun Google bilan kiring.</div>`;
      return;
    }
    const ok = await isAdminUser(user);
    if (!ok) {
      ui.btnSign.classList.remove('hide');
      ui.meBox.classList.add('hide');
      ui.list.innerHTML = `<div class="empty">Kechirasiz, bu bo‘lim faqat adminlar uchun. Hisobingizda ruxsat yo‘q.</div>`;
      return;
    }
    // admin bo'lsa:
    ui.btnSign.classList.add('hide');
    ui.meBox.classList.remove('hide');
    ui.meName.textContent  = user.displayName || 'No name';
    ui.meEmail.textContent = user.email;

    bootstrapAdmin(); // hammasini ishga tushiramiz
  });

  // ---------- Global holat
  const state = {
    unsub: null,
    data: [],
    allCities: new Set(),
    filter: {
      type: 'all',
      city: 'all',
      search: '',
      limit: 100
    }
  };

  // ---------- Foydali formatlar
  const fmtDate = ms => {
    const d = ms ? new Date(ms) : new Date();
    return d.toLocaleString('uz-UZ', {year:'numeric',month:'short',day:'2-digit', hour:'2-digit',minute:'2-digit'});
  };

  const iconFor = t => t==='lost'?'❗️':(t==='found'?'✅':'🎁');

  // ---------- Admin ishga tushishi
  function bootstrapAdmin(){
    // Controls listeners
    ui.btnReload.addEventListener('click', forceReload);
    ui.filterType.addEventListener('change', e => {state.filter.type = e.target.value; render();});
    ui.filterCity.addEventListener('change', e => {state.filter.city = e.target.value; render();});
    ui.limitSel.addEventListener('change', e => {state.filter.limit = +e.target.value; attachLive();});
    ui.searchBox.addEventListener('input', e => {state.filter.search = e.target.value.trim().toLowerCase(); render();});
    ui.btnClear.addEventListener('click', () => { ui.searchBox.value=''; state.filter.search=''; render(); });

    // Real-time ulanish
    attachLive();
  }

  // ---------- Firestore real-time listener
  function attachLive(){
    // avvalgi listenerni to'xtatamiz
    if (state.unsub) state.unsub();

    const q = query(
      collection(db, 'Elonlar'),
      orderBy('createdAt', 'desc'),
      limit(state.filter.limit)
    );

    state.unsub = onSnapshot(q, snap => {
      const arr = [];
      const cities = new Set();
      snap.forEach(d => {
        const v = d.data();
        // fallback
        const item = {
          id: d.id,
          type: v.type || 'lost',                    // lost / found / reward
          title: v.title || '(sarlavha yo‘q)',
          text: v.text || (v.desc || ''),
          city: v.city || v.shahar || 'Noma’lum',
          phone: v.phone || v.telefon || '',
          createdAt: v.createdAt?.toMillis?.() || v.createdAt || Date.now(),
          user: v.user || { uid: v.uid || '—', email: v.email || '—', name: v.name || v.displayName || '—' }
        };
        arr.push(item);
        if (item.city) cities.add(item.city);
      });

      state.data = arr;
      state.allCities = cities;
      fillCityFilter();
      render();
    }, err => {
      console.error(err);
      ui.list.innerHTML = `<div class="empty">Ma’lumotni olishda xato: ${err.message}</div>`;
    });
  }

  function forceReload(){
    attachLive();
  }

  // ---------- Shahar filterini to'ldirish
  function fillCityFilter(){
    const sel = ui.filterCity;
    const cur = sel.value || 'all';
    const opts = ['<option value="all">Barcha shaharlar</option>',
      ...[...state.allCities].sort((a,b)=>a.localeCompare(b,'uz')).map(c=>`<option value="${escapeHTML(c)}">${escapeHTML(c)}</option>`)];
    sel.innerHTML = opts.join('');
    // eski tanlovni saqlash
    if ([...state.allCities].includes(cur)) sel.value = cur;
  }

  // ---------- Render
  function render(){
    const s = state.filter.search;
    const t = state.filter.type;
    const c = state.filter.city;

    let items = state.data.filter(x => {
      const okType = t==='all' || x.type===t;
      const okCity = c==='all' || x.city===c;
      const okSearch = !s || (
        (x.title && x.title.toLowerCase().includes(s)) ||
        (x.text  && x.text.toLowerCase().includes(s))  ||
        (x.city  && x.city.toLowerCase().includes(s))  ||
        (x.user?.email && x.user.email.toLowerCase().includes(s)) ||
        (x.user?.uid   && x.user.uid.toLowerCase().includes(s))
      );
      return okType && okCity && okSearch;
    });

    // KPIlar
    ui.kTotal.textContent = state.data.length;
    ui.kLost.textContent   = state.data.filter(x => x.type==='lost').length;
    ui.kFound.textContent  = state.data.filter(x => x.type==='found').length;
    ui.kReward.textContent = state.data.filter(x => x.type==='reward').length;

    if (!items.length){
      ui.list.innerHTML = `<div class="empty">Hech narsa topilmadi. Filtr yoki qidiruvni o‘zgartiring.</div>`;
      return;
    }

    ui.list.innerHTML = items.map(toRowHTML).join('');
    // har bir tugmaga handler biriktiramiz
    $$('.btnDel').forEach(b => b.addEventListener('click', onDeleteClick));
  }

  // ---------- Bir qator HTML
  function toRowHTML(x){
    const when = fmtDate(x.createdAt);
    const typeTag = x.type==='lost' ? 'lost' : (x.type==='found' ? 'found' : 'reward');
    const safeTitle = escapeHTML(x.title);
    const safeText  = escapeHTML(x.text);
    const safeCity  = escapeHTML(x.city);
    const owner = x.user || {};
    const ownName  = escapeHTML(owner.name || '—');
    const ownEmail = escapeHTML(owner.email || '—');
    const ownUid   = escapeHTML(owner.uid || '—');

    return `
    <div class="row" data-id="${x.id}">
      <div class="rowHead wrap">
        <span class="tag ${typeTag}">${iconFor(x.type)} ${x.type.toUpperCase()}</span>
        <span class="chip">Shahar: ${safeCity}</span>
        <span class="chip">Vaqt: ${when}</span>
        ${x.phone ? `<span class="chip">📞 ${escapeHTML(x.phone)}</span>`:''}
        <span class="sp"></span>
        <div class="tools">
          <button class="btn red btnDel" data-id="${x.id}" data-title="${encodeURIComponent(safeTitle)}">O‘chirish</button>
        </div>
      </div>
      <div class="rowBody">
        <div class="title truncate" title="${safeTitle}">${safeTitle}</div>
        ${safeText ? `<div>${safeText}</div>`:''}
        <div class="meta wrap">
          <span>🧑‍💼 <b>${ownName}</b></span>
          <span>•</span>
          <span class="truncate" title="${ownEmail}">✉️ ${ownEmail}</span>
          <span>•</span>
          <span class="mono">UID: ${ownUid}</span>
          <span>•</span>
          <span class="mono">ID: ${x.id}</span>
        </div>
      </div>
    </div>`;
  }

  // ---------- O'chirish oqimi
  const dlg = $('#confirmDlg');
  const infoBox = $('#confirmInfo');
  const yesBtn = $('#yesBtn');
  const noBtn  = $('#noBtn');

  let pendingDelete = null;

  function onDeleteClick(e){
    const id = e.currentTarget.dataset.id;
    const title = decodeURIComponent(e.currentTarget.dataset.title || '');
    pendingDelete = id;
    infoBox.textContent = `ID: ${id}\nSarlavha: ${title}`;
    dlg.showModal();
  }
  noBtn.addEventListener('click', ()=> dlg.close());
  yesBtn.addEventListener('click', async ()=>{
    if (!pendingDelete) return dlg.close();
    try{
      await deleteDoc(doc(db, 'Elonlar', pendingDelete));
    }catch(err){
      alert('O‘chirishda xatolik: ' + err.message);
    }finally{
      pendingDelete = null;
      dlg.close();
    }
  });

  // ---------- Xelpler
  function escapeHTML(s=''){
    return s.replace(/[&<>"']/g, m => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
    }[m]));
  }
  $('#year').textContent = new Date().getFullYear();

  // Qo‘shimcha: admin kirgan vaqtni rules/{uid} ichida 'lastAdminAt' sifatida yozib borish (ixtiyoriy)
  onAuthStateChanged(auth, async user=>{
    try{
      if(user && (await isAdminUser(user))){
        const ref = doc(db, 'rules', user.uid);
        const snap = await getDoc(ref);
        if(snap.exists()){
          // faqat field qo'shish uchun — optional (logging)
          // bu yerda serverTimestamp() yozish uchun security rules allow update bo'lishi zarur
          // try/catch ichida qoldiramiz; muvaffaqiyatsiz bo'lsa ham panel ishlashda davom etadi
          // import qilingan serverTimestamp() bor
          await (await import("https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"))
          ; // placeholder — real projects would set lastAdminAt: serverTimestamp()
        }
      }
    }catch(_){}
  });

</script>
</body>
  </html>
