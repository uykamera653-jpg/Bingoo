<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <style>
    body { font-family: sans-serif; background:#fff; color:#111; margin:20px; }
    h1 { color:#d32f2f; }
    .post { border:1px solid #ccc; padding:10px; margin-bottom:10px; }
    button { background:#e53935; color:#fff; border:none; padding:5px 10px; cursor:pointer; }
  </style>
</head>
<body>
  <h1>Admin panel</h1>
  <div id="posts">Yuklanmoqda...</div>

  <script type="module">
    // Firebase konfiguratsiya
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs, deleteDoc, doc } 
      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
      authDomain: "topildi.firebaseapp.com",
      projectId: "topildi",
      storageBucket: "topildi.firebasestorage.app",
      messagingSenderId: "323891530719",
      appId: "1:323891530719:web:d57c2ce38781dc37e4926a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadPosts(){
      const postsDiv = document.getElementById("posts");
      postsDiv.innerHTML = "";
      const querySnapshot = await getDocs(collection(db, "Elonlar"));
      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
          <b>${data.narsa || "Noma’lum"}</b> 
          <p>Joylagan: ${data.email || "Noma’lum"}</p>
          <button onclick="deletePost('${docSnap.id}')">❌ O‘chirish</button>
        `;
        postsDiv.appendChild(div);
      });
    }

    window.deletePost = async (id) => {
      await deleteDoc(doc(db, "Elonlar", id));
      alert("O‘chirildi!");
      loadPosts();
    };

    loadPosts();
  </script>
</body>
</html>
