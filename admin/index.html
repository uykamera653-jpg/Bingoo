<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Admin · BINGO</title>
<meta name="theme-color" content="#ffffff">
<style>
  :root{--bg:#f8fafc;--card:#ffffff;--ink:#0f172a;--muted:#475569;--ring:#e2e8f0;--red:#ef4444;--green:#16a34a;--amber:#f59e0b;--blue:#2563eb}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter}
  body{background:var(--bg);color:var(--ink)}
  .top{position:sticky;top:0;z-index:40;background:#fff;border-bottom:1px solid var(--ring)}
  .bar{max-width:1100px;margin:0 auto;display:flex;gap:10px;align-items:center;justify-content:space-between;padding:10px 14px}
  .brand{display:flex;gap:10px;align-items:center;font-weight:900}
  .shield{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:#fff;border:1px solid var(--ring)}
  .pill{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--ring);border-radius:999px;padding:8px 12px;background:#fff}
  .wrap{max-width:1100px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--ring);border-radius:14px}
  .pane{padding:12px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media (max-width:900px){.grid{grid-template-columns:1fr}}
  .post{padding:12px;border:1px solid var(--ring);border-radius:12px;background:#fff}
  .head{display:flex;gap:8px;justify-content:space-between;align-items:center}
  .meta{font-size:12px;color:var(--muted)}
  .img{width:100%;max-height:260px;object-fit:cover;border:1px solid var(--ring);border-radius:10px;background:#f1f5f9}
  .row{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
  .tag{font-size:12px;background:#f1f5f9;border:1px solid var(--ring);border-radius:999px;padding:4px 8px}
  .btn{border-radius:10px;border:1px solid var(--ring);background:#0f172a;color:#fff;padding:8px 12px;cursor:pointer}
  .btn.red{background:#dc2626}
  .btn.gray{background:#475569}
  .btn.blue{background:#2563eb}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  input,select{border:1px solid var(--ring);border-radius:10px;padding:8px 10px;background:#fff}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  .empty{padding:20px;text-align:center;color:var(--muted)}
  .stats{display:flex;gap:10px;flex-wrap:wrap}
  .stat{border:1px solid var(--ring);background:#fff;border-radius:12px;padding:10px 12px}
  .foot{margin-top:18px;text-align:center;color:#64748b}
</style>
</head>
<body>
  <div class="top">
    <div class="bar">
      <div class="brand"><div class="shield">🛡️</div><div>Admin Panel</div></div>
      <div class="tools">
        <a class="btn gray" href="../" target="_self">Bosh sahifa</a>
        <button id="refreshBtn" class="btn blue">🔄 Yangilash</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <!-- Filtr/Qidirish / Statistikalar -->
    <div class="card pane" style="margin-bottom:14px">
      <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:space-between">
        <div class="tools">
          <select id="filterKind">
            <option value="">— Barchasi —</option>
            <option value="lost">❗ Yo‘qotilgan</option>
            <option value="found">✅ Topilgan</option>
            <option value="reward">🎁 Mukofotli</option>
          </select>
          <input id="q" placeholder="Qidirish: narsa, shahar, uid, aloqa">
        </div>
        <div class="stats">
          <div class="stat">Jami: <b id="st_total">0</b></div>
          <div class="stat">Yo‘qotilgan: <b id="st_lost">0</b></div>
          <div class="stat">Topilgan: <b id="st_found">0</b></div>
          <div class="stat">Mukofotli: <b id="st_reward">0</b></div>
        </div>
      </div>
    </div>

    <!-- Ro‘yxat -->
    <div id="list" class="grid"></div>
    <div id="empty" class="card empty" style="display:none">Hozircha e’lonlar yo‘q.</div>

    <!-- Sahifalash -->
    <div class="card pane" style="margin-top:14px;display:flex;gap:8px;justify-content:center">
      <button id="prevBtn" class="btn gray" disabled>⟵ Oldingi</button>
      <button id="nextBtn" class="btn gray" disabled>Keyingi ⟶</button>
    </div>

    <div class="foot">© <span id="year"></span> BINGO · Admin</div>
  </div>

  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script>
  // ===== Firebase (sening loyihang) =====
  const firebaseConfig={
    apiKey:"AIzaSyA39AFiKjNF3XO4NwkwzU1HA_5pKV9xEN4",
    authDomain:"topildi.firebaseapp.com",
    databaseURL:"https://topildi-default-rtdb.firebaseio.com",
    projectId:"topildi",
    storageBucket:"topildi.appspot.com",
    messagingSenderId:"323891530719",
    appId:"1:323891530719:web:d57c2ce38781dc37e4926a",
    measurementId:"G-NKCMKCXZQ7"
  };
  try{ firebase.initializeApp(firebaseConfig); }catch(e){}
  const db=firebase.firestore();

  // ===== Holat =====
  let PAGE=0, PAGE_SIZE=20, LAST=null, FIRST=null, SNAP_UNSUB=null;
  let RAW=[], FILTER_KIND="", QUERY="";

  const elYear=document.getElementById('year'); elYear.textContent=(new Date()).getFullYear();
  const $=id=>document.getElementById(id);
  const listEl=$('list'), emptyEl=$('empty');

  $('filterKind').addEventListener('change',e=>{FILTER_KIND=e.target.value||''; render()});
  $('q').addEventListener('input',e=>{QUERY=(e.target.value||'').toLowerCase(); render()});
  $('refreshBtn').addEventListener('click', ()=>loadPage(true));
  $('prevBtn').addEventListener('click', ()=>pageMove(-1));
  $('nextBtn').addEventListener('click', ()=>pageMove(+1));

  function pageMove(dir){
    if(dir<0 && PAGE===0) return;
    PAGE+=dir;
    loadPage(false);
  }

  function loadPage(reset){
    if(SNAP_UNSUB){ try{SNAP_UNSUB()}catch{} SNAP_UNSUB=null; }
    if(reset){ PAGE=0; LAST=null; FIRST=null; }

    let q=db.collection('posts');
    // Agar created maydoni barcha hujjatlarda bo'lsa — tartiblaymiz
    q=q.orderBy('created','desc');

    if(PAGE>0 && LAST) q=q.startAfter(LAST);
    q=q.limit(PAGE_SIZE);

    SNAP_UNSUB=q.onSnapshot(s=>{
      RAW=s.docs.map(d=>({id:d.id,...d.data()}));
      if(s.docs.length){
        FIRST=s.docs[0]; LAST=s.docs[s.docs.length-1];
        $('prevBtn').disabled=(PAGE===0);
        $('nextBtn').disabled=(s.docs.length<PAGE_SIZE);
      }else{
        $('prevBtn').disabled=(PAGE===0);
        $('nextBtn').disabled=true;
      }
      render();
    },err=>{
      // Ba'zi hujjatlarda 'created' yo'q bo'lsa — fallback: tartiblashsiz o‘qib chiqamiz
      console.warn('orderBy(created) xato, fallback',err.message);
      db.collection('posts').limit(PAGE_SIZE).onSnapshot(s=>{
        RAW=s.docs.map(d=>({id:d.id,...d.data()}));
        $('prevBtn').disabled=true; $('nextBtn').disabled=true;
        render();
      });
    });
  }

  function stat(arr){
    $('st_total').textContent=arr.length;
    $('st_lost').textContent=arr.filter(p=>p.kind==='lost').length;
    $('st_found').textContent=arr.filter(p=>p.kind==='found').length;
    $('st_reward').textContent=arr.filter(p=>p.kind==='lost' && (p.reward||0)>0).length;
  }

  function render(){
    let arr=RAW.slice();

    if(FILTER_KIND==='lost') arr=arr.filter(p=>p.kind==='lost');
    else if(FILTER_KIND==='found') arr=arr.filter(p=>p.kind==='found');
    else if(FILTER_KIND==='reward') arr=arr.filter(p=>p.kind==='lost' && (p.reward||0)>0);

    if(QUERY){
      arr=arr.filter(p=>{
        const f=(x)=> (x||'').toString().toLowerCase().includes(QUERY);
        return f(p.item)||f(p.city)||f(p.place)||f(p.notes)||f(p.uid)||f(p.contact);
      });
    }

    stat(arr);

    if(!arr.length){
      listEl.innerHTML=''; emptyEl.style.display='block'; return;
    }
    emptyEl.style.display='none';

    listEl.innerHTML=arr.map(p=>tpl(p)).join('');
    // tugmalar
    listEl.querySelectorAll('[data-del]').forEach(b=>{
      b.addEventListener('click', ()=>remove(b.dataset.del, b));
    });
  }

  function tpl(p){
    const kind=p.kind==='lost'?'❗ Yo‘qotilgan':'✅ Topilgan';
    const rew=(p.reward||0)>0?` · 🎁 ${Number(p.reward).toLocaleString()} so‘m`:``;
    const dt=p.created?new Date(p.created).toLocaleString():''; 
    return `
      <article class="post">
        ${p.photo?`<img class="img" src="${esc(p.photo)}" loading="lazy" alt="">`:''}
        <div class="head">
          <div style="font-weight:800">${esc(p.item||'-')}</div>
          <div class="meta">${dt}</div>
        </div>
        <div class="row"><span class="tag">${kind}${rew}</span><span class="tag">UID: ${esc(p.uid||'-')}</span></div>
        <div class="row"><span class="tag">Shahar: ${esc(p.city||'-')}</span><span class="tag">Joy: ${esc(p.place||'-')}</span></div>
        <div class="row"><span class="tag">Aloqa: ${esc(p.contact||'-')}</span></div>
        ${p.notes?`<div style="margin:6px 0;color:#334155">${nl(esc(p.notes))}</div>`:''}
        <div class="row" style="justify-content:flex-end">
          <a class="btn" href="../#postChat-${p.id}" target="_self">✉️ Xabarlar</a>
          <button class="btn red" data-del="${p.id}">🗑️ O‘chirish</button>
        </div>
      </article>
    `;
  }

  function esc(s){return (s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
  function nl(s){return s.replace(/\n/g,'<br>')}

  async function remove(id, btn){
    if(!confirm('E’lon o‘chirilsinmi? Bu amalni qaytarib bo‘lmaydi.')) return;
    btn.disabled=true;
    try{
      // chatlarini ham tozalaymiz
      const ref=db.collection('posts').doc(id);
      const chats=await ref.collection('chats').get();
      const batch=db.batch(); chats.forEach(d=>batch.delete(d.ref)); await batch.commit();
      await ref.delete();
    }catch(e){
      alert('O‘chirish xatosi: '+e.message);
    }finally{ btn.disabled=false; }
  }

  // start
  loadPage(true);
  </script>
</body>
</html>
