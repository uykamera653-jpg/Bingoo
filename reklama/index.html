<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>📢 Reklama — BINGO</title>
  <link rel="stylesheet" href="/main/css/base.css" />
  <style>
    .wrap{max-width:980px;margin:24px auto;padding:0 16px}
    .back{display:inline-flex;gap:8px;align-items:center;text-decoration:none;margin:8px 0}
    .title{display:flex;align-items:center;gap:12px;margin:8px 0 14px}
    .title h1{margin:0}

    /* --- Reklama slayder --- */
    .ad-frame{
      position:relative; width:100%; aspect-ratio:16/7; max-height:520px;
      border-radius:20px; overflow:hidden; background:#0f172a;
      box-shadow:0 16px 40px rgba(0,0,0,.18);
    }
    .ad-slide{
      position:absolute; inset:0; width:100%; height:100%;
      object-fit:cover; opacity:0; transform:scale(1.04);
      transition:opacity .8s ease, transform 7s linear;
      will-change:opacity,transform;
    }
    .ad-slide.active{ opacity:1; transform:scale(1.0); }

    /* Pastdagi suzuvchi yozuv */
    .ad-floating{
      position:absolute; left:50%; bottom:14px; transform:translateX(-50%);
      display:inline-flex; align-items:center; gap:10px;
      padding:10px 16px; border-radius:999px;
      background:rgba(15,23,42,.6); border:1px solid rgba(148,163,184,.28);
      backdrop-filter:blur(6px); color:#e2e8f0; font-weight:700;
      animation:floatY 4.5s ease-in-out infinite;
    }
    .ad-star{color:#fbbf24;font-size:18px;line-height:1}
    @keyframes floatY{0%{transform:translate(-50%,0)}50%{transform:translate(-50%,-7px)}100%{transform:translate(-50%,0)}}

    /* Nuqtachalar */
    .ad-dots{position:absolute; right:12px; bottom:12px; display:flex; gap:8px}
    .ad-dot{
      width:9px;height:9px;border-radius:50%;border:0;cursor:pointer;
      background:rgba(255,255,255,.35)
    }
    .ad-dot.active{background:#fff}

    /* Tugmalar paneli */
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}
    .btn{padding:.6rem 1rem;border-radius:10px;border:1px solid rgba(0,0,0,.08);background:#fff;cursor:pointer}
    .btn:hover{transform:translateY(-1px)}

    @media (max-width:640px){
      .ad-frame{border-radius:16px; aspect-ratio:16/9;}
      .ad-floating{padding:8px 12px; bottom:10px}
    }
  </style>
</head>
<body>
  <header class="wrap">
    <a class="back" href="/main/index.html">⬅️ Bosh sahifa</a>
    <div class="title">
      <span style="font-size:1.5rem">📢</span>
      <h1>Reklama</h1>
    </div>
    <div class="toolbar">
      <a class="btn" href="/lost/index.html">❗ Yo‘qotilganlar</a>
      <a class="btn" href="/found/index.html">✅ Topilganlar</a>
      <a class="btn" href="/reward/index.html">🎁 Mukofotli</a>
      <a class="btn" href="/my/index.html">⭐ Mening e’lonlarim</a>
    </div>
  </header>

  <main class="wrap">
    <!-- SLAYDER -->
    <div class="ad-frame" id="adFrame" aria-label="Reklama slayderi">
      <!-- 1-rasm -->
      <a href="#" target="_blank" rel="noopener" aria-label="Reklama 1 havola">
        <img
          class="ad-slide active"
          src="/images/file_000000002de8624383c746f2d7d3cfd7.png"
          alt="Reklama 1"
          decoding="async"
          fetchpriority="high"
        />
      </a>
      <!-- 2-rasm -->
      <a href="#" target="_blank" rel="noopener" aria-label="Reklama 2 havola">
        <img
          class="ad-slide"
          src="/images/file_00000000538861fab34b2e1a449b4ce5.png"
          alt="Reklama 2"
          decoding="async"
          fetchpriority="low"
        />
      </a>

      <!-- Suzuvchi yozuv -->
      <div class="ad-floating">
        <span class="ad-star">★</span>
        <span>Bu yerda sizning reklamangiz bo‘lishi mumkin</span>
      </div>

      <!-- Nuqtachalar -->
      <div class="ad-dots" role="tablist" aria-label="Slaydlar ko‘rsatkichi">
        <button class="ad-dot active" aria-label="1-slayd" aria-selected="true"></button>
        <button class="ad-dot" aria-label="2-slayd" aria-selected="false"></button>
      </div>
    </div>

    <!-- Izoh/yo‘riqnoma (ixtiyoriy) -->
    <section style="margin-top:14px;background:#fff;border-radius:14px;padding:14px;box-shadow:0 8px 24px rgba(0,0,0,.08)">
      <b>Izoh:</b> Rasm ustiga bosilganda tashqi havolaga yo‘naltirish mumkin. Hozircha havolalar <code>#</code> qilib qo‘yilgan.
    </section>
  </main>

  <footer class="wrap" style="margin:24px 0;color:#666">© 2025 BINGO</footer>

  <script>
    // Slayder mantiqi
    (function(){
      const frame = document.getElementById('adFrame');
      const slides = Array.from(frame.querySelectorAll('.ad-slide'));
      const dots   = Array.from(frame.querySelectorAll('.ad-dot'));
      if(!slides.length) return;

      let i = 0, timer = null;
      const show = (idx) => {
        slides.forEach((im,k)=>im.classList.toggle('active',k===idx));
        dots.forEach((d,k)=>{ d.classList.toggle('active',k===idx); d.setAttribute('aria-selected', String(k===idx)); });
        i = idx;
      };

      const start = ()=> timer = setInterval(()=> show((i+1)%slides.length), 6000);
      const stop  = ()=> { if(timer) clearInterval(timer); };

      // Dots click
      dots.forEach((d,idx)=> d.addEventListener('click', ()=>{ stop(); show(idx); start(); }));

      // Visibility optimizatsiya
      document.addEventListener('visibilitychange', ()=> document.hidden ? stop() : start());

      // Hoverda pauza (desktop)
      frame.addEventListener('mouseenter', stop);
      frame.addEventListener('mouseleave', start);

      // Start
      show(0); start();
    })();
  </script>
</body>
</html>
